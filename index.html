<!DOCTYPE html>
<html lang="fr">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CJBOT</title>

  <style>
    body {
      margin: 0;
      font-family: -apple-system, BlinkMacSystemFont, sans-serif;
      background: radial-gradient(circle at top, #1e293b, #0b1220 70%);
      color: white;
    }

    .app {
      padding: 24px;
    }

    .header {
      text-align: center;
      margin-bottom: 40px;
    }

    .avatar {
      width: 80px;
      height: 80px;
      background: linear-gradient(135deg, #3b82f6, #2563eb);
      border-radius: 50%;
      margin: auto;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 28px;
      font-weight: bold;
    }

    .card {
      background: rgba(255,255,255,0.05);
      backdrop-filter: blur(15px);
      border-radius: 16px;
      padding: 20px;
      margin-bottom: 20px;
      border: 1px solid rgba(255,255,255,0.08);
    }

    .balance {
      display: flex;
      justify-content: space-between;
      font-size: 18px;
    }

    .amount {
      color: #3b82f6;
      font-weight: 600;
    }

    .actions button {
      width: 100%;
      padding: 14px;
      margin-bottom: 12px;
      border-radius: 14px;
      border: none;
      background: linear-gradient(90deg, #3b82f6, #2563eb);
      color: white;
      font-size: 16px;
      font-weight: 600;
    }

    /* MODAL */

    .modal {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.6);
      backdrop-filter: blur(10px);
      justify-content: center;
      align-items: center;
    }

    .modal-content {
      background: #111827;
      padding: 25px;
      border-radius: 20px;
      width: 85%;
      max-width: 350px;
      text-align: center;
    }

    .modal-content button {
      width: 100%;
      padding: 14px;
      margin-bottom: 12px;
      border-radius: 14px;
      border: none;
      background: linear-gradient(90deg, #3b82f6, #2563eb);
      color: white;
      font-weight: 600;
    }

    .close-btn {
      background: #374151;
    }

  </style>

</head>

<body>

  <div class="app">

    <div class="header">
      <div class="avatar">CJ</div>
      <h1>CJBOT</h1>
      <p>Boutique Premium Crypto</p>
    </div>

    <div class="card balance">
      <span>Solde</span>
      <span class="amount">0.00€</span>
    </div>

    <div class="card">
      <h3>Programme fidélité</h3>
      <p>Pour chaque 500€ rechargés, recevez 90€ bonus.</p>
    </div>

    <div class="actions">
      <button onclick="openShop()">🛒 Ouvrir la boutique</button>
      <button onclick="recharge()">💳 Recharger</button>
      <button onclick="support()">📩 Support</button>
    </div>

  </div>

  <!-- MODAL -->
  <div id="depositModal" class="modal">
    <div class="modal-content">
      <h3>Choisir un dépôt</h3>

      <button onclick="selectCrypto('BTC')">₿ Bitcoin (BTC)</button>
      <button onclick="selectCrypto('ETH')">Ξ Ethereum (ETH)</button>
      <button onclick="selectCrypto('USDT')">₮ USDT (ERC20)</button>

      <button class="close-btn" onclick="closeModal()">Fermer</button>
    </div>
  </div>

  <script>
    function recharge() {
      document.getElementById("depositModal").style.display = "flex";
    }

    function closeModal() {
      document.getElementById("depositModal").style.display = "none";
    }

    function selectCrypto(crypto) {
      alert("Adresse de dépôt pour " + crypto);
    }

    function openShop() {
      alert("Boutique bientôt disponible");
    }

    function support() {
      alert("Contact support");
    }
  </script>

</body>
</html>
