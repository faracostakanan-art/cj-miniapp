<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CJ-SHOP</title>

<style>
body{
  margin:0;
  font-family:-apple-system,BlinkMacSystemFont,sans-serif;
  background:radial-gradient(circle at top,#1e293b,#0b1220 70%);
  color:white;
}

.app{
  padding:24px;
  min-height:100vh;
}

.header{
  text-align:center;
  margin-bottom:30px;
}

.avatar{
  width:90px;
  height:90px;
  background:linear-gradient(135deg,#3b82f6,#2563eb);
  border-radius:50%;
  display:flex;
  align-items:center;
  justify-content:center;
  font-size:28px;
  font-weight:700;
  margin:auto;
}

.card{
  background:rgba(255,255,255,0.05);
  backdrop-filter:blur(15px);
  border-radius:18px;
  padding:20px;
  margin-bottom:20px;
  border:1px solid rgba(255,255,255,0.08);
}

.balance{
  display:flex;
  justify-content:space-between;
  font-size:18px;
}

.amount{
  color:#3b82f6;
  font-weight:600;
}

button{
  width:100%;
  padding:15px;
  border:none;
  border-radius:16px;
  font-weight:600;
  font-size:16px;
  background:linear-gradient(90deg,#3b82f6,#2563eb);
  color:white;
  margin-bottom:15px;
}

button:active{
  transform:scale(0.97);
}

.hidden{
  display:none;
}
</style>
</head>

<body>

<!-- PAGE ACCUEIL -->
<div id="homePage" class="app">

  <div class="header">
    <div class="avatar">CJ</div>
    <h1>CJBOT</h1>
    <p>Boutique Premium Crypto</p>
  </div>

  <div class="card balance">
    <span>Solde</span>
    <span class="amount">0.00€</span>
  </div>

  <div class="card">
    <h3>Programme fidélité</h3>
    <p>Pour chaque 500€ rechargés, recevez 90€ bonus.</p>
  </div>

  <button onclick="openLogsPage()">🛒 Ouvrir la boutique</button>
  <button>💳 Recharger</button>
  <button>📩 Support</button>

</div>

<!-- PAGE LOGS -->
<div id="logsPage" class="app hidden">

  <div class="header">
    <h1>Tasty Logs</h1>
    <p>mini-application</p>
  </div>

  <div class="card" style="text-align:center;">
    <div style="opacity:0.6;">SOLDE DISPONIBLE</div>
    <div style="font-size:42px;font-weight:700;margin:10px 0;">
      €0.00
    </div>
    <div style="opacity:0.5;font-size:14px;">
      Appuyer pour actualiser
    </div>
  </div>

  <div class="card" style="display:flex;gap:10px;">
    <button style="flex:1;background:#111827;">Liste</button>
    <button style="flex:1;background:#1f2937;">Box</button>
  </div>

  <div class="card">
    <strong>Filtrer</strong>
  </div>

  <div style="opacity:0.6;margin:15px 0;">2 résultats</div>

  <!-- Produit LOG -->
  <div class="card">
    <div style="display:flex;justify-content:space-between;">
      <div>
        <div style="font-weight:600;">LOG</div>
        <div style="opacity:0.6;">Accès LOG</div>
      </div>
      <div style="text-align:right;">
        <div style="font-size:22px;font-weight:600;">€45.00</div>
        <button style="margin-top:15px;width:auto;padding:8px 16px;">
          AJOUTER
        </button>
      </div>
    </div>
  </div>

  <!-- Produit CC -->
  <div class="card">
    <div style="display:flex;justify-content:space-between;">
      <div>
        <div style="font-weight:600;">CC</div>
        <div style="opacity:0.6;">Accès CC</div>
      </div>
      <div style="text-align:right;">
        <div style="font-size:22px;font-weight:600;">€30.00</div>
        <button style="margin-top:15px;width:auto;padding:8px 16px;">
          AJOUTER
        </button>
      </div>
    </div>
  </div>

  <button onclick="backHome()">⬅ Retour</button>

</div>

<script>

function openLogsPage(){
  document.getElementById("homePage").classList.add("hidden");
  document.getElementById("logsPage").classList.remove("hidden");
}

function backHome(){
  document.getElementById("logsPage").classList.add("hidden");
  document.getElementById("homePage").classList.remove("hidden");
}

</script>

</body>
</html>
