<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>BIENVENUE IN CJ SHOP</title>
<script src="https://telegram.org/js/telegram-web-app.js"></script>
</head>

<body style="background:#0f0f0f;color:white;text-align:center;font-family:sans-serif;padding-top:40px;">

<h2>CJ SHOP</h2>
<div id="content">Chargement...</div>

<script>

function startApp() {

  var orderId = "CJ" + Math.floor(Math.random()*1000000);
  var priceUSD = 50;

  var BTC_ADDRESS = "bc1q2kd0kpzmvr9nz6xhwgvjpk7kapcw3wd9r6wjzz";
  var ETH_ADDRESS = "0x1F3E0A4E2ec341C718d706ACdabad874484033ae";
  var USDT_ADDRESS = "0x5A652C891ee6F1cAF45c829A0e42f81856524939";

  document.getElementById("content").innerHTML = `
  <p>Produit Premium</p>
  <p>Prix: ${priceUSD} USD</p>

  <h3>Paiement</h3>

  <p><b>BTC</b><br>${BTC_ADDRESS}</p>
  <p><b>ETH</b><br>${ETH_ADDRESS}</p>
  <p><b>USDT TRC20</b><br>${USDT_ADDRESS}</p>

  <p><b>Référence:</b> ${orderId}</p>

  <p>⚠️ Envoyez le montant exact.</p>

  <button onclick="paid('${orderId}')">J'ai payé</button>
  `;
}

function paid(orderId) {
  var message = "Bonjour, j'ai payé la commande " + orderId;
  window.location.href = "https://t.me/@o0h01?text=" + encodeURIComponent(message);
}

window.onload = function() {
  startApp();
};

</script>

</body>
</html>
