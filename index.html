<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CJAYSHOP</title>

<style>
body{
margin:0;
font-family:-apple-system,BlinkMacSystemFont,sans-serif;
background:#0b0f14;
color:white;
}

.app{padding:20px 20px 100px 20px;}

.topbar{
display:flex;
justify-content:space-between;
align-items:center;
margin-bottom:20px;
font-size:18px;
font-weight:600;
}

.balance-card{
background:#111;
border-radius:20px;
padding:30px;
text-align:center;
margin-bottom:20px;
}

.balance-card h1{
font-size:42px;
margin:10px 0;
}

.tabs{
display:flex;
background:#111;
border-radius:15px;
overflow:hidden;
margin-bottom:20px;
}

.tabs div{
flex:1;
padding:12px;
text-align:center;
opacity:0.6;
}

.tabs .active{
background:#1c1c1c;
opacity:1;
}

.filter{
background:#111;
padding:15px;
border-radius:15px;
margin-bottom:15px;
text-align:center;
}

.product{
background:#0f2a17;
border:2px solid #1f8f4a;
border-radius:20px;
padding:20px;
margin-bottom:20px;
}

.product-header{
display:flex;
gap:10px;
margin-bottom:15px;
}

.badge{
padding:4px 10px;
border-radius:10px;
font-size:12px;
}

.purple{background:#5b3ba8;}
.gray{background:#333;}
.orange{background:#8a5a00;}

.product-grid{
display:grid;
grid-template-columns:1fr 1fr;
gap:10px;
margin:15px 0;
font-size:14px;
}

.price{
font-size:24px;
font-weight:bold;
}

.withdraw-btn{
background:#22c55e;
border:none;
padding:14px;
border-radius:15px;
color:white;
font-weight:600;
width:100%;
cursor:pointer;
}

.bottom-nav{
position:fixed;
bottom:0;
left:0;
right:0;
background:#111;
display:flex;
justify-content:space-around;
padding:15px 0;
border-top:1px solid #222;
}

.bottom-nav div{
text-align:center;
font-size:13px;
opacity:0.6;
}

.bottom-nav .active{
opacity:1;
color:#3b82f6;
}

button{
cursor:pointer;
}

.hidden{display:none;}

</style>
</head>

<body>

<div id="home" class="app">

<div class="topbar">
<div>CJAYSHOP</div>
</div>

<div class="balance-card">
<div>Solde disponible</div>
<h1>€0.00</h1>
<div style="opacity:0.5;font-size:14px;">Appuyer pour actualiser</div>
</div>

<div class="actions">
<button onclick="openShop()" style="width:100%;padding:14px;border-radius:15px;border:none;background:#3b82f6;color:white;margin-bottom:10px;">
🛒 Ouvrir la boutique
</button>

<button onclick="alert('Recharge')"
style="width:100%;padding:14px;border-radius:15px;border:none;background:#2563eb;color:white;">
💳 Recharger
</button>
</div>

</div>

<!-- BOUTIQUE -->

<div id="shop" class="app hidden">

<div class="topbar">
<div onclick="goHome()" style="color:#3b82f6;">Fermer</div>
<div>CJAYSHOP</div>
<div>•••</div>
</div>

<div class="balance-card">
<div>SOLDE DISPONIBLE</div>
<h1>€0.00</h1>
<div style="opacity:0.5;font-size:14px;">Appuyer pour actualiser</div>
</div>

<div class="tabs">
<div class="active">Liste</div>
<div>Box</div>
</div>

<div class="filter">🔎 Filtrer</div>

<div style="margin-bottom:10px;opacity:0.6;">8 résultats</div>

<div class="product">

<div class="product-header">
<div class="badge purple">PETER</div>
<div class="badge gray">ANDROID</div>
<div class="badge orange">5H</div>
</div>

<div class="product-grid">
<div><strong>AGE</strong><br>28 ans</div>
<div><strong>BANQUE</strong><br>Inconnue</div>
<div><strong>PRÉNOM</strong><br>Michael</div>
<div><strong>CODE POSTAL</strong><br>Inconnu</div>
</div>

<div class="price">€70.00</div>

<button class="withdraw-btn">RETIRER</button>

</div>

</div>

<!-- NAVBAR -->

<div class="bottom-nav hidden" id="navbar">
<div class="active">🏠<br>Accueil</div>
<div>🛒<br>Panier</div>
<div>📦<br>Commandes</div>
<div>↩<br>Refund</div>
</div>

<script>

function openShop(){
document.getElementById("home").classList.add("hidden");
document.getElementById("shop").classList.remove("hidden");
document.getElementById("navbar").classList.remove("hidden");
}

function goHome(){
document.getElementById("shop").classList.add("hidden");
document.getElementById("home").classList.remove("hidden");
document.getElementById("navbar").classList.add("hidden");
}

</script>

</body>
</html>
