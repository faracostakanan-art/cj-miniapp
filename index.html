<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CJBOT</title>

<script src="https://telegram.org/js/telegram-web-app.js"></script>

<style>

/* BASE */

body{
margin:0;
font-family:-apple-system,BlinkMacSystemFont,sans-serif;
background:radial-gradient(circle at top,#1e293b,#0b1220 70%);
color:white;
}

.app{padding:24px;}

.header{text-align:center;margin-bottom:40px;}

.avatar{
width:80px;
height:80px;
background:linear-gradient(135deg,#3b82f6,#2563eb);
border-radius:50%;
margin:auto;
display:flex;
align-items:center;
justify-content:center;
font-size:28px;
font-weight:bold;
}

/* CARD */

.card{
background:rgba(255,255,255,0.05);
backdrop-filter:blur(15px);
border-radius:16px;
padding:20px;
margin-bottom:20px;
border:1px solid rgba(255,255,255,0.08);
animation:fadeIn .6s ease;
transition:.3s;
}

.card:hover{
transform:scale(1.03);
}

.balance{
display:flex;
justify-content:space-between;
font-size:18px;
}

.amount{
color:#3b82f6;
font-weight:600;
}

/* BUTTONS */

.actions button,
.modal-content button,
.buy{
width:100%;
padding:14px;
margin-bottom:12px;
border-radius:14px;
border:none;
background:linear-gradient(90deg,#3b82f6,#2563eb);
color:white;
font-size:16px;
font-weight:600;
cursor:pointer;
transition:.25s;
}

.buy:hover,
.actions button:hover{
transform:scale(1.04);
box-shadow:0 5px 20px rgba(0,0,0,0.3);
}

.close-btn{background:#374151;}
.back-btn{background:#1f2937;}

/* MODAL */

.modal{
display:none;
position:fixed;
inset:0;
background:rgba(0,0,0,0.6);
backdrop-filter:blur(10px);
justify-content:center;
align-items:center;
}

.modal-content{
background:#111827;
padding:25px;
border-radius:20px;
width:90%;
max-width:380px;
animation:zoom .3s ease;
}

/* GRID */

.grid{
display:grid;
grid-template-columns:1fr 1fr;
gap:10px;
margin-top:15px;
}

.full{grid-column:1/3;}

.info{
margin:6px 0;
font-size:14px;
}

/* PRODUCTS GRID */

.products{
display:grid;
grid-template-columns:1fr 1fr;
gap:15px;
margin-top:15px;
}

.product-card{
background:#1e293b;
border-radius:14px;
padding:15px;
transition:.3s;
animation:fadeIn .6s ease;
}

.product-card:hover{
transform:scale(1.05);
}

.product-card img{
width:100%;
border-radius:10px;
}

/* SKELETON LOADING */

.skeleton{
background:linear-gradient(
90deg,
#1e293b,
#334155,
#1e293b
);
background-size:200%;
animation:loading 1.5s infinite;
height:80px;
border-radius:10px;
margin-bottom:10px;
}

/* ANIMATIONS */

@keyframes fadeIn{
from{
opacity:0;
transform:translateY(20px);
}
to{
opacity:1;
transform:translateY(0);
}
}

@keyframes zoom{
from{
transform:scale(.8);
opacity:0;
}
to{
transform:scale(1);
opacity:1;
}
}

@keyframes loading{
0%{background-position:200%}
100%{background-position:-200%}
}

</style>
</head>

<body>

<div class="app">

<div class="header">
<div class="avatar">CJ</div>
<h1>CJBOT</h1>
<p>Boutique Premium Crypto</p>
</div>

<div class="card balance">
<span>Solde</span>
<span class="amount">0.00€</span>
</div>

<div class="card">
<h3>Programme fidélité</h3>
<p>500€ rechargés = 90€ bonus</p>
</div>

<div class="actions">
<button onclick="openShop()">🛒 Ouvrir la boutique</button>
<button onclick="openDeposit()">💳 Recharger</button>
<button onclick="support()">📩 Support</button>
</div>

</div>

<div id="modal" class="modal">
<div class="modal-content" id="modalContent"></div>
</div>

<script>

const tg = window.Telegram ? window.Telegram.WebApp : null;
if(tg){ tg.expand(); }

const addresses = {
BTC:"bc1q5t9rtfkjlkj4f3hr4kh9j5khcwqz52lv03dkrr",
ETH:"0x5A652C891ee6F1cAF45c829A0e42f81856524939",
USDT:"0x5A652C891ee6F1cAF45c829A0e42f81856524939",
USDC:"0x5A652C891ee6F1cAF45c829A0e42f81856524939"
};

function openDeposit(){

document.getElementById("modal").style.display="flex";

document.getElementById("modalContent").innerHTML=`

<div class="skeleton"></div>

<h3>💰 DÉPÔT CRYPTO</h3>

<div class="info">Choisissez votre crypto:</div>
<div class="info">✅ Paiement instantané</div>
<div class="info">✅ Confirmation automatique</div>
<div class="info">✅ Minimum 10€</div>

<div class="grid">
<button onclick="selectCrypto('USDT')">USDT (ERC20)</button>
<button onclick="selectCrypto('USDC')">USDC (ERC20)</button>
<button onclick="selectCrypto('BTC')">₿ Bitcoin</button>
<button onclick="selectCrypto('ETH')">Ξ Ethereum</button>
<button class="full back-btn" onclick="closeModal()">⬅ Retour</button>
</div>
`;
}

function selectCrypto(crypto){

document.getElementById("modalContent").innerHTML=`

<h3>💰 DÉPÔT EN ${crypto}</h3>

<div class="info">Sélectionnez le montant:</div>
<div class="info">💡 Minimum: 10€ | Maximum: 1000€</div>

<div class="grid">
<button onclick="showAddress('${crypto}',10)">10€</button>
<button onclick="showAddress('${crypto}',25)">25€</button>
<button onclick="showAddress('${crypto}',50)">50€</button>
<button onclick="showAddress('${crypto}',100)">100€</button>
<button onclick="showAddress('${crypto}',250)">250€</button>
<button onclick="showAddress('${crypto}',500)">500€</button>
<button class="full back-btn" onclick="openDeposit()">⬅ Retour</button>
</div>

`;
}

function showAddress(crypto, amount){

document.getElementById("modalContent").innerHTML=`

<h3>Dépôt ${crypto}</h3>

<div class="info">Montant sélectionné: <strong>${amount}€</strong></div>

<p style="word-break:break-all;font-size:13px;margin:15px 0;">
${addresses[crypto]}
</p>

<button onclick="copyAddress('${addresses[crypto]}')">
Copier l'adresse
</button>

<button class="back-btn" onclick="selectCrypto('${crypto}')">
⬅ Retour
</button>

<button class="close-btn" onclick="closeModal()">
Fermer
</button>

`;
}

function copyAddress(addr){

navigator.clipboard.writeText(addr);

if(tg){
tg.showAlert("Adresse copiée");
}else{
alert("Adresse copiée");
}

}

function closeModal(){
document.getElementById("modal").style.display="none";
}

function openShop(){
if(tg){
tg.showAlert("Boutique bientôt disponible");
}else{
alert("Boutique bientôt disponible");
}
}

function support(){
if(tg){
tg.showAlert("Support bientôt disponible");
}else{
alert("Support bientôt disponible");
}
}

</script>

</body>
</html>
