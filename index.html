<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CJBOT</title>

<script src="https://cdn.jsdelivr.net/npm/ethers@5.7.2/dist/ethers.min.js"></script>

<style>
body{
margin:0;
font-family:-apple-system,BlinkMacSystemFont,sans-serif;
background:radial-gradient(circle at top,#1e293b,#0b1220 70%);
color:white;
}
.app{padding:24px;}
.header{text-align:center;margin-bottom:40px;}
.avatar{
width:80px;height:80px;
background:linear-gradient(135deg,#3b82f6,#2563eb);
border-radius:50%;
margin:auto;
display:flex;
align-items:center;
justify-content:center;
font-size:28px;
font-weight:bold;
cursor:pointer;
}
.card{
background:rgba(255,255,255,0.05);
backdrop-filter:blur(15px);
border-radius:16px;
padding:20px;
margin-bottom:20px;
border:1px solid rgba(255,255,255,0.08);
}
.balance{display:flex;justify-content:space-between;font-size:18px;}
.amount{color:#3b82f6;font-weight:600;}
.actions button,.modal-content button{
width:100%;
padding:14px;
margin-bottom:12px;
border-radius:14px;
border:none;
background:linear-gradient(90deg,#3b82f6,#2563eb);
color:white;
font-size:16px;
font-weight:600;
cursor:pointer;
}
.modal{
display:none;
position:fixed;
inset:0;
background:rgba(0,0,0,0.6);
backdrop-filter:blur(10px);
justify-content:center;
align-items:center;
}
.modal-content{
background:#111827;
padding:25px;
border-radius:20px;
width:85%;
max-width:350px;
text-align:center;
max-height:80vh;
overflow-y:auto;
}
.close-btn{background:#374151;}
input{
width:100%;
padding:10px;
border-radius:10px;
border:none;
margin-bottom:10px;
}
</style>
</head>
<body>

<div class="app">
<div class="header">
<div class="avatar">CJ</div>
<h1>CJBOT</h1>
<p>Boutique Premium Crypto</p>
</div>

<div class="card balance">
<span>Solde</span>
<span class="amount" id="balanceAmount">0.00€</span>
</div>

<div class="actions">
<button onclick="openShop()">🛒 Ouvrir la boutique</button>
<button onclick="openHistory()">📜 Historique</button>
<button onclick="recharge()">💳 Recharger</button>
</div>
</div>

<div id="depositModal" class="modal">
<div class="modal-content" id="modalContent"></div>
</div>

<script>

/* NOUVELLES ADRESSES */

const addresses = {
BTC: "bc1q5t9rtfkjlkj4f3hr4kh9j5khcwqz52lv03dkrr",
ETH: "0x5A652C891ee6F1cAF45c829A0e42f81856524939",
USDT: "0x5A652C891ee6F1cAF45c829A0e42f81856524939"
};

const products=[
{ id:1,name:"LOG",price:45 },
{ id:2,name:"CC",price:30 }
];

function updateUI(){
let balance=parseFloat(localStorage.getItem("balance"))||0;
document.getElementById("balanceAmount").innerText=balance.toFixed(2)+"€";
}

/* DEPOT */

function recharge(){
document.getElementById("modalContent").innerHTML=`
<h3>Dépôt</h3>
<p>BTC :</p>
<p style="word-break:break-all">${addresses.BTC}</p>
<p>ETH / USDT :</p>
<p style="word-break:break-all">${addresses.ETH}</p>
<button class="close-btn" onclick="closeModal()">Fermer</button>
`;
document.getElementById("depositModal").style.display="flex";
}

/* SHOP */

function openShop(){
let content=`<h3>Boutique</h3>`;
products.forEach(p=>{
content+=`
<div style="background:rgba(255,255,255,0.05);padding:12px;border-radius:12px;margin-bottom:10px;">
<strong>${p.name}</strong><br>${p.price}€
<button onclick="checkout(${p.price})">Payer avec MetaMask</button>
</div>`;
});
content+=`<button class="close-btn" onclick="closeModal()">Fermer</button>`;
document.getElementById("modalContent").innerHTML=content;
document.getElementById("depositModal").style.display="flex";
}

/* METAMASK PAIEMENT REEL */

async function checkout(total){

if(typeof window.ethereum==="undefined"){
alert("MetaMask non installé");
return;
}

await ethereum.request({method:"eth_requestAccounts"});
const provider=new ethers.providers.Web3Provider(window.ethereum);
const signer=provider.getSigner();

const tx={
to:addresses.ETH,
value:ethers.utils.parseEther((total/3000).toString())
};

await signer.sendTransaction(tx);
alert("Transaction envoyée");
}

/* HISTORIQUE LOCAL */

function openHistory(){
let history=JSON.parse(localStorage.getItem("history"))||[];
alert("Transactions locales: "+history.length);
}

function closeModal(){
document.getElementById("depositModal").style.display="none";
}

updateUI();

</script>
</body>
</html>
