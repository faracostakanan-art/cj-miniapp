<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CJAYSHOP</title>

<style>

/* ===== RESET ===== */

*{margin:0;padding:0;box-sizing:border-box;}
body{
font-family:-apple-system,BlinkMacSystemFont,"SF Pro Display",sans-serif;
background:#000;
color:#fff;
}

/* ===== LAYOUT ===== */

.screen{
position:fixed;
inset:0;
background:#000;
display:none;
flex-direction:column;
}

.screen.active{
display:flex;
}

/* ===== HEADER ===== */

.header{
height:60px;
display:flex;
align-items:center;
justify-content:space-between;
padding:0 16px;
background:#111;
font-weight:600;
}

.header span{
color:#3b82f6;
cursor:pointer;
}

/* ===== CONTENT ===== */

.content{
flex:1;
overflow-y:auto;
padding:16px;
padding-bottom:90px;
}

/* ===== BALANCE CARD ===== */

.balance{
background:#111;
border-radius:22px;
padding:30px;
text-align:center;
margin-bottom:20px;
}

.balance h1{
font-size:42px;
margin:10px 0;
}

/* ===== TABS ===== */

.tabs{
display:flex;
background:#111;
border-radius:14px;
overflow:hidden;
margin-bottom:20px;
}

.tab{
flex:1;
text-align:center;
padding:12px;
opacity:.5;
}

.tab.active{
background:#1a1a1a;
opacity:1;
}

/* ===== FILTER ===== */

.filter{
background:#111;
border-radius:14px;
padding:14px;
text-align:center;
margin-bottom:20px;
}

/* ===== PRODUCT CARD ===== */

.product{
background:#0f2a17;
border:1.5px solid #22c55e;
border-radius:20px;
padding:18px;
margin-bottom:20px;
}

.badges{
display:flex;
gap:8px;
margin-bottom:14px;
}

.badge{
padding:5px 10px;
border-radius:10px;
font-size:12px;
}

.purple{background:#5b3ba8;}
.gray{background:#333;}
.orange{background:#8a5a00;}

.grid{
display:grid;
grid-template-columns:1fr 1fr;
gap:10px;
font-size:14px;
margin-bottom:15px;
}

.price{
font-size:22px;
font-weight:700;
margin-bottom:12px;
}

.btn-green{
background:#22c55e;
border:none;
padding:14px;
width:100%;
border-radius:16px;
color:#fff;
font-weight:600;
cursor:pointer;
}

/* ===== BOTTOM NAV ===== */

.navbar{
position:fixed;
bottom:0;
left:0;
right:0;
height:70px;
background:#111;
display:flex;
justify-content:space-around;
align-items:center;
border-top:1px solid #222;
}

.nav-item{
text-align:center;
font-size:12px;
opacity:.6;
}

.nav-item.active{
opacity:1;
color:#3b82f6;
}

/* ===== HOME ===== */

.home{
padding:20px;
}

.home button{
width:100%;
padding:16px;
border:none;
border-radius:18px;
background:#3b82f6;
color:white;
font-weight:600;
margin-top:20px;
cursor:pointer;
}

</style>
</head>
<body>

<!-- HOME -->
<div id="home" class="home">
<h1>CJAYSHOP</h1>
<button onclick="openShop()">🛒 Ouvrir la boutique</button>
</div>

<!-- SHOP SCREEN -->
<div id="shopScreen" class="screen">

<div class="header">
<span onclick="closeShop()">Fermer</span>
<div>CJAYSHOP</div>
<div>•••</div>
</div>

<div class="content">

<div class="balance">
<div>SOLDE DISPONIBLE</div>
<h1>€0.00</h1>
<div style="opacity:.5;font-size:14px;">Appuyer pour actualiser</div>
</div>

<div class="tabs">
<div class="tab active">Liste</div>
<div class="tab">Box</div>
</div>

<div class="filter">Filtrer</div>

<div style="opacity:.5;margin-bottom:10px;">8 résultats</div>

<div class="product">

<div class="badges">
<div class="badge purple">PETER</div>
<div class="badge gray">ANDROID</div>
<div class="badge orange">5H</div>
</div>

<div class="grid">
<div><strong>AGE</strong><br>28 ans</div>
<div><strong>BANQUE</strong><br>Inconnue</div>
<div><strong>PRÉNOM</strong><br>Michael</div>
<div><strong>CODE POSTAL</strong><br>Inconnu</div>
</div>

<div class="price">€70.00</div>

<button class="btn-green">RETIRER</button>

</div>

</div>

<div class="navbar">
<div class="nav-item active">🏠<br>Accueil</div>
<div class="nav-item">🛒<br>Panier</div>
<div class="nav-item">📦<br>Commandes</div>
<div class="nav-item">↩<br>Refund</div>
</div>

</div>

<script>

function openShop(){
document.getElementById("shopScreen").classList.add("active");
}

function closeShop(){
document.getElementById("shopScreen").classList.remove("active");
}

</script>

</body>
</html>
