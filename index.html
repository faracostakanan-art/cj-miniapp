<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CJBOT</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <div class="app">

    <!-- HEADER -->
    <div class="header">
      <div class="avatar">CJ</div>
      <h1>CJBOT</h1>
      <p>Boutique Premium Crypto</p>
    </div>

    <!-- SOLDE -->
    <div class="card balance">
      <span>Solde</span>
      <span class="amount">0.00€</span>
    </div>

    <!-- PROGRAMME -->
    <div class="card">
      <h3>Programme fidélité</h3>
      <p>Pour chaque 1000€ rechargés, recevez 50€ bonus.</p>
    </div>

    <!-- ACTIONS -->
    <div class="actions">
      <button onclick="openShop()">🛒 Ouvrir la boutique</button>
      <button onclick="recharge()">💳 Recharger</button>
      <button onclick="support()">📩 Support</button>
    </div>

  </div>

<script src="script.js"></script>
</body>
</html>
