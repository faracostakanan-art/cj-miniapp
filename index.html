<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>CJ Mini App</title>
  <script src="https://telegram.org/js/telegram-web-app.js"></script>
</head>
<body style="background:#0f0f0f;color:white;text-align:center;padding-top:50px;font-family:sans-serif;">

<h1>CJ Mini App</h1>
<p id="user">Chargement...</p>

<script>
  const tg = window.Telegram.WebApp;
  tg.expand();

  if (tg.initDataUnsafe && tg.initDataUnsafe.user) {
    const user = tg.initDataUnsafe.user;
    document.getElementById("user").innerHTML =
      "Bienvenue " + user.first_name + "<br>ID: " + user.id;
  } else {
    document.getElementById("user").innerHTML = "Ouvert hors Telegram";
  }
</script>

</body>
</html>
