<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CJBOT - Boutique</title>
<script src="https://telegram.org/js/telegram-web-app.js"></script>
<style>
body{margin:0;font-family:-apple-system,BlinkMacSystemFont,sans-serif;background:radial-gradient(circle at top,#1e293b,#0b1220 70%);color:white;}
.app{padding:24px;}
.header{text-align:center;margin-bottom:40px;}
.avatar{width:80px;height:80px;background:linear-gradient(135deg,#3b82f6,#2563eb);border-radius:50%;margin:auto;display:flex;align-items:center;justify-content:center;font-size:28px;font-weight:bold;}
.card{background:rgba(255,255,255,0.05);backdrop-filter:blur(15px);border-radius:16px;padding:20px;margin-bottom:20px;border:1px solid rgba(255,255,255,0.08);transition:.3s;cursor:pointer;}
.card:hover{transform:scale(1.03);}
.card-header{display:flex;justify-content:space-between;align-items:center;}
.card-content{display:none;margin-top:10px;}
.button{padding:10px;border-radius:12px;border:none;background:#3b82f6;color:white;font-weight:600;cursor:pointer;transition:.25s;}
.button:hover{transform:scale(1.05);}
.back-btn{background:#1f2937;}
.close-btn{background:#374151;}
.modal{display:none;position:fixed;inset:0;background:rgba(0,0,0,0.6);backdrop-filter:blur(10px);justify-content:center;align-items:center;}
.modal-content{background:#111827;padding:25px;border-radius:20px;width:90%;max-width:480px;}
.products{display:grid;grid-template-columns:1fr 1fr;gap:15px;margin-top:15px;}
.product-card{background:#1e293b;border-radius:14px;padding:15px;transition:.3s;}
.product-card:hover{transform:scale(1.05);}
.product-card img{width:100%;border-radius:10px;}
input{width:100%;padding:8px;margin:5px 0;border-radius:8px;border:none;}
.order-bubble{background:rgba(255,255,255,0.05);padding:10px;border-radius:12px;position:relative;margin-bottom:8px;}
.order-bubble button{float:right;font-size:12px;background:#3b82f6;padding:2px 6px;border:none;border-radius:6px;color:white;cursor:pointer;}
</style>
</head>
<body>

<!-- HOME -->
<div class="app" id="home">
  <div class="header"><div class="avatar">CJ</div><h1>CJAYSHOP</h1><p>Boutique Premium Crypto</p></div>

  <div class="card balance">
    <span>Solde</span>
    <span class="amount" id="balance">0€</span>
  </div>

  <div class="card">
    <h3>Programme fidélité</h3>
    <p>500€ rechargés = 100€ bonus</p>
  </div>

  <div class="card">
    <h3>📦 Historique des commandes</h3>
    <div id="orders"></div>
  </div>

  <div class="actions">
    <button class="button" onclick="openShop()">🛒 Ouvrir la boutique</button>
    <button class="button" onclick="openDeposit()">💳 Recharger</button>
    <button class="button" onclick="support()">📩 Support</button>
    <button class="button" onclick="openAdmin()">🔒 Admin</button>
  </div>
</div>

<!-- SHOP -->
<div id="shopPage" class="app" style="display:none">
  <div class="card">
    <h3>🛒 Boutique</h3>
    <div class="products" id="productsList"></div>

    <div class="card">
      <h3>🛍 Panier</h3>
      <div id="cartList"></div>
      <button class="button" onclick="checkout()">💳 Acheter le panier</button>
    </div>

    <button class="back-btn button" onclick="closeShop()">⬅ Retour</button>
  </div>
</div>

<!-- ADMIN PANEL -->
<div id="adminPanel" class="app" style="display:none">
  <div class="header">
    <div class="avatar">CJ</div>
    <h2>🛠 Panel Admin</h2>
  </div>

  <div class="card" onclick="toggleCard('productsCard')">
    <div class="card-header"><span>📦 Produits</span><span>▼</span></div>
    <div class="card-content" id="productsCard"></div>
  </div>

  <div class="card" onclick="toggleCard('usersCard')">
    <div class="card-header"><span>👥 Utilisateurs</span><span>▼</span></div>
    <div class="card-content" id="usersCard"></div>
  </div>

  <div class="card" onclick="toggleCard('statsCard')">
    <div class="card-header"><span>📊 Statistiques</span><span>▼</span></div>
    <div class="card-content" id="statsCard"></div>
  </div>

  <button class="button" onclick="closeAdmin()">⬅ Fermer Admin</button>
</div>

<!-- MODAL -->
<div id="modal" class="modal"><div class="modal-content" id="modalContent"></div></div>

<script>
const tg = window.Telegram ? window.Telegram.WebApp : null;
if(tg){ tg.expand(); }

/* ===== VARIABLES ===== */
let balance = parseFloat(localStorage.getItem("balance")) || 0;
let orders = JSON.parse(localStorage.getItem("orders")) || [];
let products = JSON.parse(localStorage.getItem("products")) || [];
let removedProducts = JSON.parse(localStorage.getItem("removedProducts")) || [];
let users = JSON.parse(localStorage.getItem("users")) || {};

document.getElementById("balance").innerText = balance+"€";

/* ===== HOME ORDERS ===== */
function updateOrders(){
  const container = document.getElementById("orders");
  container.innerHTML = orders.map(o=>`<div class="order-bubble">${o.name} - ${o.price}€<br><small>${o.content}</small></div>`).join("");
}
updateOrders();

/* ===== SHOP & CART ===== */
let cart = [];
function renderProducts(){
  const container = document.getElementById("productsList");
  container.innerHTML = "";
  if(products.length===0){container.innerHTML="<p>Aucun produit disponible</p>"; return;}
  products.forEach(p=>{
    container.innerHTML += `<div class="product-card">
      <img src="${p.img}">
      <h4>${p.name}</h4>
      <p>${p.desc}</p>
      <button class="button" onclick="addToCart('${p.name}',${p.price},'${p.content}')">Acheter ${p.price}€</button>
    </div>`;
  });
}
function addToCart(name,price,content){
  if(cart.find(p=>p.name===name)){alert("Déjà dans le panier"); return;}
  cart.push({name,price,content});
  renderCart();
}
function removeFromCart(index){cart.splice(index,1);renderCart();}
function renderCart(){
  const container = document.getElementById("cartList");
  if(cart.length===0){container.innerHTML="<p>Panier vide</p>"; return;}
  container.innerHTML = cart.map((p,i)=>`<div class="order-bubble">${p.name} - ${p.price}€ <button onclick="removeFromCart(${i})" style="float:right">❌</button></div>`).join("");
}
function checkout(){
  if(cart.length===0){alert("Panier vide"); return;}
  let total = cart.reduce((s,p)=>s+p.price,0);
  if(total>balance){alert("Solde insuffisant"); return;}
  balance -= total;
  localStorage.setItem("balance",balance);
  document.getElementById("balance").innerText = balance+"€";

  cart.forEach(p=>{
    orders.push({name:p.name,price:p.price,content:p.content});
    removedProducts.push(p);
    products = products.filter(prod=>prod.name!==p.name);
  });

  localStorage.setItem("orders", JSON.stringify(orders));
  localStorage.setItem("removedProducts", JSON.stringify(removedProducts));
  localStorage.setItem("products", JSON.stringify(products));

  cart = [];
  renderCart();
  renderProducts();
  updateOrders();
  alert("Achat réussi ! Contenu privé disponible dans l'historique.");
}

/* ===== NAVIGATION ===== */
function openShop(){document.getElementById("home").style.display="none";document.getElementById("shopPage").style.display="block";}
function closeShop(){document.getElementById("home").style.display="block";document.getElementById("shopPage").style.display="none";}

/* ===== DEPOTS CRYPTO ===== */
const addresses={BTC:"bc1q5t9rtfkjlkj4f3hr4kh9j5khcwqz52lv03dkrr",ETH:"0x5A652C891ee6F1cAF45c829A0e42f81856524939",USDT:"0x5A652C891ee6F1cAF45c829A0e42f81856524939",USDC:"0x5A652C891ee6F1cAF45c829A0e42f81856524939"};
function openDeposit(){
  document.getElementById("modal").style.display="flex";
  document.getElementById("modalContent").innerHTML=`
    <h3>💰 DÉPÔT CRYPTO</h3>
    <div class="grid">
      <button class="button" onclick="selectCrypto('USDT')">USDT</button>
      <button class="button" onclick="selectCrypto('USDC')">USDC</button>
      <button class="button" onclick="selectCrypto('BTC')">BTC</button>
      <button class="button" onclick="selectCrypto('ETH')">ETH</button>
      <button class="back-btn button" onclick="closeModal()">⬅ Retour</button>
    </div>`;
}
function selectCrypto(c){
  document.getElementById("modalContent").innerHTML=`
    <h3>Dépôt ${c}</h3>
    <p style="word-break:break-all">${addresses[c]}</p>
    <button class="button" onclick="copyAddress('${addresses[c]}')">Copier</button>
    <button class="back-btn button" onclick="openDeposit()">⬅ Retour</button>`;
}
function copyAddress(a){navigator.clipboard.writeText(a); alert("Adresse copiée");}
function closeModal(){document.getElementById("modal").style.display="none";}
function support(){alert("Support bientôt disponible");}

/* ===== PANEL ADMIN ===== */
function openAdmin(){
  let pwd = prompt("Mot de passe admin:");
  if(pwd==="GABON241"){
    document.getElementById("home").style.display="none";
    document.getElementById("shopPage").style.display="none";
    document.getElementById("adminPanel").style.display="block";
    showProductsDashboard(); showUsersDashboard(); showStats();
  }else{alert("Mot de passe incorrect");}
}
function closeAdmin(){document.getElementById("adminPanel").style.display="none";document.getElementById("home").style.display="block";}

/* ===== ACCORDÉON ADMIN ===== */
function toggleCard(id){const card=document.getElementById(id);card.style.display=card.style.display==='block'?'none':'block';}

/* ===== DASHBOARD PRODUITS ===== */
function showProductsDashboard(){
  const container = document.getElementById('productsCard'); container.innerHTML="";
  products.forEach((p,i)=>{
    container.innerHTML+=`
      <div style="margin-bottom:10px;background:#111827;padding:10px;border-radius:12px;">
        <img src="${p.img}" style="width:60px;height:60px;border-radius:8px;float:left;margin-right:10px;">
        <b>${p.name}</b> - ${p.price}€<br><small>${p.desc}</small><br>
        <button class="button" onclick="editProduct(${i})">✏️ Editer</button>
        <button class="button" onclick="removeProduct(${i})">🗑 Supprimer</button>
        <div style="clear:both;"></div>
      </div>`;
  });
  container.innerHTML += `<button class="button" onclick="addProductPrompt()">➕ Ajouter produit</button>`;
}
function addProductPrompt(){let name=prompt("Nom du produit:");if(!name)return;let price=parseFloat(prompt("Prix (€):"));if(isNaN(price))return;let img=prompt("URL image:");let desc=prompt("Description:");let content=prompt("Contenu privé:");products.push({name,price,img,desc,content});localStorage.setItem("products",JSON.stringify(products));showProductsDashboard();}
function editProduct(i){let p=products[i];let name=prompt("Nom:",p.name);if(!name)return;let price=parseFloat(prompt("Prix:",p.price));if(isNaN(price))return;products[i].name=name;products[i].price=price;localStorage.setItem("products",JSON.stringify(products));showProductsDashboard();}
function removeProduct(i){removedProducts.push(products[i]);products.splice(i,1);localStorage.setItem("products",JSON.stringify(products));localStorage.setItem("removedProducts",JSON.stringify(removedProducts));showProductsDashboard();}

/* ===== DASHBOARD UTILISATEURS ===== */
function showUsersDashboard(){const container=document.getElementById('usersCard');container.innerHTML="";Object.keys(users).forEach(id=>{let u=users[id];container.innerHTML+=`<div style="background:#111827;padding:10px;margin-bottom:10px;border-radius:12px;"><b>${u.username}</b> - Solde: ${u.balance}€ <button class="button" onclick="adjustBalance('${id}')">💰</button><br>Dépôts: ${u.deposits}€ - Refunds: ${u.refunds||0}/3<button class="button" onclick="viewUserOrders('${id}')">📦 Commandes</button></div>`;});}
function adjustBalance(id){let val=parseFloat(prompt("Nouveau solde:",users[id].balance||0));if(!isNaN(val)){users[id].balance=val;localStorage.setItem("users",JSON.stringify(users));showUsersDashboard();}}
function viewUserOrders(id){let uOrders=orders.filter(o=>o.userId===id);if(uOrders.length===0){alert("Pas de commandes");return;}let html=uOrders.map(o=>`<div class="order-bubble"><b>${o.name} - ${o.price}€</b><br>${o.content}</div>`).join("");document.getElementById("modal").style.display="flex";document.getElementById("modalContent").innerHTML=`${html}<button class="button" onclick="closeModal()">⬅ Retour</button>`;}

/* ===== STATISTIQUES ===== */
function showStats(){const container=document.getElementById('statsCard');let totalSales=orders.reduce((s,o)=>s+o.price,0);let totalDeposits=Object.values(users).reduce((s,u)=>s+(u.deposits||0),0);container.innerHTML=`<p>Total ventes: ${totalSales}€</p><p>Total dépôts: ${totalDeposits}€</p><p>Nombre utilisateurs: ${Object.keys(users).length}</p>`;}

renderProducts(); renderCart();
</script>
</body><!-- NOTIFICATIONS -->
<div id="toastContainer" style="position:fixed;bottom:20px;right:20px;z-index:9999;"></div>

<script>
function showToast(message,type="info"){
  const container = document.getElementById("toastContainer");
  const toast = document.createElement("div");
  toast.innerText = message;
  toast.style.background = type==="success"?"#16a34a":type==="error"?"#dc2626":"#2563eb";
  toast.style.color = "white";
  toast.style.padding = "12px 20px";
  toast.style.borderRadius = "12px";
  toast.style.marginTop = "10px";
  toast.style.boxShadow = "0 5px 15px rgba(0,0,0,0.3)";
  toast.style.opacity = "0";
  toast.style.transform = "translateY(50px)";
  toast.style.transition = "0.4s ease";

  container.appendChild(toast);

  // animation d'entrée
  setTimeout(()=>{ toast.style.opacity="1"; toast.style.transform="translateY(0)"; }, 50);

  // suppression automatique
  setTimeout(()=>{
    toast.style.opacity="0"; toast.style.transform="translateY(50px)";
    setTimeout(()=>container.removeChild(toast),400);
  },3000);
}

// Exemple : remplacer les alert() existantes par showToast
function alertSuccess(msg){ showToast(msg,"success"); }
function alertError(msg){ showToast(msg,"error"); }
function alertInfo(msg){ showToast(msg,"info"); }

// === Remplacer alert() dans ton code ===
// Par exemple dans checkout():
function checkout(){
  if(cart.length===0){ alertError("Panier vide"); return; }
  let total = cart.reduce((s,p)=>s+p.price,0);
  if(total>balance){ alertError("Solde insuffisant"); return; }
  balance -= total;
  localStorage.setItem("balance",balance);
  document.getElementById("balance").innerText = balance+"€";

  cart.forEach(p=>{
    orders.push({name:p.name,price:p.price,content:p.content});
    removedProducts.push(p);
    products = products.filter(prod=>prod.name!==p.name);
  });

  localStorage.setItem("orders", JSON.stringify(orders));
  localStorage.setItem("removedProducts", JSON.stringify(removedProducts));
  localStorage.setItem("products", JSON.stringify(products));

  cart = [];
  renderCart();
  renderProducts();
  updateOrders();
  alertSuccess("Achat réussi ! Contenu privé disponible dans l'historique.");
}

// Idem pour copier l'adresse crypto
function copyAddress(a){navigator.clipboard.writeText(a); alertSuccess("Adresse copiée");}
</script>
</html>
