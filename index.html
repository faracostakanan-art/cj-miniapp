<!DOCTYPE html>
<html lang="fr">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CJBOT</title>

  <style>
    body {
      margin: 0;
      font-family: -apple-system, BlinkMacSystemFont, sans-serif;
      background: radial-gradient(circle at top, #1e293b, #0b1220 70%);
      color: white;
    }

    .app {
      padding: 24px;
    }

    .header {
      text-align: center;
      margin-bottom: 40px;
    }

    .avatar {
      width: 80px;
      height: 80px;
      background: linear-gradient(135deg, #3b82f6, #2563eb);
      border-radius: 50%;
      margin: auto;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 28px;
      font-weight: bold;
    }

    .card {
      background: rgba(255,255,255,0.05);
      backdrop-filter: blur(15px);
      border-radius: 16px;
      padding: 20px;
      margin-bottom: 20px;
      border: 1px solid rgba(255,255,255,0.08);
    }

    .balance {
      display: flex;
      justify-content: space-between;
      font-size: 18px;
    }

    .amount {
      color: #3b82f6;
      font-weight: 600;
    }

    .actions button {
      width: 100%;
      padding: 14px;
      margin-bottom: 12px;
      border-radius: 14px;
      border: none;
      background: linear-gradient(90deg, #3b82f6, #2563eb);
      color: white;
      font-size: 16px;
      font-weight: 600;
      transition: 0.3s;
    }

    .actions button:hover {
      transform: scale(1.02);
    }
  </style>

</head>

<body>

  <div class="app">

    <div class="header">
      <div class="avatar">CJ</div>
      <h1>CJBOT</h1>
      <p>Boutique Premium Crypto</p>
    </div>

    <div class="card balance">
      <span>Solde</span>
      <span class="amount">0.00€</span>
    </div>

    <div class="card">
      <h3>Programme fidélité</h3>
      <p>Pour chaque 500€ rechargés, recevez 90€ bonus.</p>
    </div>

    <div class="actions">
      <button onclick="openShop()">🛒 Ouvrir la boutique</button>
      <button onclick="recharge()">💳 Recharger</button>
      <button onclick="support()">📩 Support</button>
    </div>

  </div>

  <script src="script.js"></script>

</body>
</html>
