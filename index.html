<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CJBOT - Boutique</title>
<script src="https://telegram.org/js/telegram-web-app.js"></script>
<style>
body{margin:0;font-family:-apple-system,BlinkMacSystemFont,sans-serif;background:radial-gradient(circle at top,#1e293b,#0b1220 70%);color:white;}
.app{padding:24px;}
.header{text-align:center;margin-bottom:40px;}
.avatar{width:80px;height:80px;background:linear-gradient(135deg,#3b82f6,#2563eb);border-radius:50%;margin:auto;display:flex;align-items:center;justify-content:center;font-size:28px;font-weight:bold;}
.card{background:rgba(255,255,255,0.05);backdrop-filter:blur(15px);border-radius:16px;padding:20px;margin-bottom:20px;border:1px solid rgba(255,255,255,0.08);animation:fadeIn .6s ease;transition:.3s;}
.card:hover{transform:scale(1.03);}
.balance{display:flex;justify-content:space-between;font-size:18px;}
.amount{color:#3b82f6;font-weight:600;}
button{width:100%;padding:14px;margin-bottom:12px;border-radius:14px;border:none;background:linear-gradient(90deg,#3b82f6,#2563eb);color:white;font-size:16px;font-weight:600;cursor:pointer;transition:.25s;}
button:hover{transform:scale(1.04);box-shadow:0 5px 20px rgba(0,0,0,0.3);}
.back-btn{background:#1f2937;}
.close-btn{background:#374151;}
.modal{display:none;position:fixed;inset:0;background:rgba(0,0,0,0.6);backdrop-filter:blur(10px);justify-content:center;align-items:center;}
.modal-content{background:#111827;padding:25px;border-radius:20px;width:90%;max-width:480px;animation:zoom .3s ease;}
.grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-top:15px;}
.full{grid-column:1/3;}
.info{margin:6px 0;font-size:14px;}
.products{display:grid;grid-template-columns:1fr 1fr;gap:15px;margin-top:15px;}
.product-card{background:#1e293b;border-radius:14px;padding:15px;transition:.3s;animation:fadeIn .6s ease;}
.product-card:hover{transform:scale(1.05);}
.product-card:active{transform:scale(0.95);}
.product-card img{width:100%;border-radius:10px;}
table{width:100%;border-collapse:collapse;margin-top:10px;}
th,td{padding:8px;text-align:left;border-bottom:1px solid rgba(255,255,255,0.1);}
th{background:#111827;}
td button{width:auto;padding:6px 10px;margin:0 2px;font-size:14px;}
@keyframes fadeIn{from{opacity:0;transform:translateY(20px);}to{opacity:1;transform:translateY(0);} }
@keyframes zoom{from{transform:scale(.8);opacity:0;}to{transform:scale(1);opacity:1;} }
</style>
</head>
<body>

<!-- HOME -->
<div class="app" id="home">
<div class="header"><div class="avatar">CJ</div><h1>CJAYSHOP</h1><p>Boutique Premium Crypto</p></div>

<div class="card balance">
<span>Solde</span>
<span class="amount" id="balance">0€</span>
</div>

<div class="card">
<h3>Programme fidélité</h3>
<p>500€ rechargés = 100€ bonus</p>
</div>

<div class="card">
<h3>📦 Historique des commandes</h3>
<div id="orders"></div>
</div>

<div class="actions">
<button onclick="openShop()">🛒 Ouvrir la boutique</button>
<button onclick="openDeposit()">💳 Recharger</button>
<button onclick="support()">📩 Support</button>
<button onclick="openAdmin()">🔒 Admin</button>
</div>
</div>

<!-- SHOP -->
<div id="shopPage" class="app" style="display:none">
<div class="card">
<h3>🛒 Boutique</h3>
<div class="products" id="productsList"></div>

<div class="card">
<h3>🛍 Panier</h3>
<div id="cartList"></div>
<button onclick="checkout()">💳 Acheter le panier</button>
</div>

<button class="back-btn" onclick="closeShop()">⬅ Retour</button>
</div>
</div>

<!-- ADMIN PANEL -->
<div id="adminPanel" class="app" style="display:none">
<div class="card">
<h3>🛠 Panel Admin</h3>
<div style="margin-bottom:15px;">
<button onclick="showProductsDashboard()">📦 Produits</button>
<button onclick="showUsersDashboard()">👥 Utilisateurs</button>
<button onclick="showStats()">📊 Statistiques</button>
<button class="back-btn" onclick="closeAdmin()">⬅ Fermer</button>
</div>
<div id="adminContent"></div>
</div>
</div>

<!-- MODAL -->
<div id="modal" class="modal"><div class="modal-content" id="modalContent"></div></div>

<script>
const tg = window.Telegram ? window.Telegram.WebApp : null;
if(tg){ tg.expand(); }

/* ===== VARIABLES ===== */
let balance = parseFloat(localStorage.getItem("balance")) || 0;
let orders = JSON.parse(localStorage.getItem("orders")) || [];
let products = JSON.parse(localStorage.getItem("products")) || [];
let removedProducts = JSON.parse(localStorage.getItem("removedProducts")) || [];
let users = JSON.parse(localStorage.getItem("users")) || {}; 
let sessionUserId = localStorage.getItem("sessionUserId") || "user_" + Date.now();

/* ===== TRACKING USER ACCESS ===== */
if(!users[sessionUserId]){
  users[sessionUserId] = {username:"N/A",balance:0,deposits:0,refunds:0,orders:[]};
  localStorage.setItem("users",JSON.stringify(users));
}
localStorage.setItem("sessionUserId",sessionUserId);

document.getElementById("balance").innerText = users[sessionUserId].balance + "€";

/* ===== COMMANDES ET PRODUITS ===== */
function updateOrders(){
  const container = document.getElementById("orders");
  let userOrders = orders.filter(o=>o.userId===sessionUserId);
  container.innerHTML = userOrders.map(o=>`<div class="info">${o.name} - ${o.price}€<br><small>${o.content}</small></div>`).join("");
}
updateOrders();

function renderProducts(){
  const container = document.getElementById("productsList");
  container.innerHTML = "";
  if(products.length===0){container.innerHTML="<p>Aucun produit disponible</p>"; return;}
  products.forEach(p=>{
    container.innerHTML += `<div class="product-card">
      <img src="${p.img}">
      <h4>${p.name}</h4>
      <p>${p.desc}</p>
      <button onclick="addToCart('${p.name}',${p.price},'${p.content}')">Acheter ${p.price}€</button>
    </div>`;
  });
}

let cart = [];
function addToCart(name,price,content){
  if(cart.find(p=>p.name===name)){alert("Déjà dans le panier"); return;}
  cart.push({name,price,content});
  renderCart();
}
function removeFromCart(index){cart.splice(index,1);renderCart();}
function renderCart(){
  const container = document.getElementById("cartList");
  if(cart.length===0){container.innerHTML="<p>Panier vide</p>"; return;}
  container.innerHTML = cart.map((p,i)=>`<div class="info">${p.name} - ${p.price}€ <button onclick="removeFromCart(${i})" style="float:right">❌</button></div>`).join("");
}
function checkout(){
  if(cart.length===0){alert("Panier vide"); return;}
  let total = cart.reduce((s,p)=>s+p.price,0);
  if(total>users[sessionUserId].balance){alert("Solde insuffisant"); return;}
  users[sessionUserId].balance -= total;
  localStorage.setItem("users",JSON.stringify(users));
  document.getElementById("balance").innerText = users[sessionUserId].balance + "€";

  cart.forEach(p=>{
    let order = {userId:sessionUserId,name:p.name,price:p.price,content:p.content};
    orders.push(order);
    removedProducts.push(p);
    products = products.filter(prod=>prod.name!==p.name);
  });

  localStorage.setItem("orders", JSON.stringify(orders));
  localStorage.setItem("removedProducts", JSON.stringify(removedProducts));
  localStorage.setItem("products", JSON.stringify(products));

  cart=[];
  renderCart();
  renderProducts();
  updateOrders();
  alert("Achat réussi ! Contenu privé disponible dans l'historique.");
}

/* ===== NAVIGATION ===== */
function openShop(){document.getElementById("home").style.display="none";document.getElementById("shopPage").style.display="block";}
function closeShop(){document.getElementById("home").style.display="block";document.getElementById("shopPage").style.display="none";}

/* ===== DEPOT CRYPTO ===== */
const addresses={BTC:"bc1q5t9rtfkjlkj4f3hr4kh9j5khcwqz52lv03dkrr",ETH:"0x5A652C891ee6F1cAF45c829A0e42f81856524939",USDT:"0x5A652C891ee6F1cAF45c829A0e42f81856524939",USDC:"0x5A652C891ee6F1cAF45c829A0e42f81856524939"};
function openDeposit(){
  document.getElementById("modal").style.display="flex";
  document.getElementById("modalContent").innerHTML=`
    <h3>💰 DÉPÔT CRYPTO</h3>
    <div class="grid">
      <button onclick="selectCrypto('USDT')">USDT</button>
      <button onclick="selectCrypto('USDC')">USDC</button>
      <button onclick="selectCrypto('BTC')">BTC</button>
      <button onclick="selectCrypto('ETH')">ETH</button>
      <button class="full back-btn" onclick="closeModal()">⬅ Retour</button>
    </div>`;
}
function selectCrypto(c){
  document.getElementById("modalContent").innerHTML=`
    <h3>Dépôt ${c}</h3>
    <p style="word-break:break-all">${addresses[c]}</p>
    <button onclick="copyAddress('${addresses[c]}')">Copier</button>
    <button class="back-btn" onclick="openDeposit()">⬅ Retour</button>`;
}
function copyAddress(a){navigator.clipboard.writeText(a); alert("Adresse copiée");}
function closeModal(){document.getElementById("modal").style.display="none";}
function support(){alert("Support bientôt disponible");}

/* ===== PANEL ADMIN ===== */
function openAdmin(){
  let pwd = prompt("Mot de passe admin:");
  if(pwd==="GABON241"){
    document.getElementById("home").style.display="none";
    document.getElementById("shopPage").style.display="none";
    document.getElementById("adminPanel").style.display="block";
  }else{alert("Mot de passe incorrect");}
}
function closeAdmin(){document.getElementById("adminPanel").style.display="none";document.getElementById("home").style.display="block";}

/* ===== DASHBOARD PRODUITS ===== */
function showProductsDashboard(){
  let html = `<h4>Produits disponibles</h4><table>
    <tr><th>Image</th><th>Nom</th><th>Prix</th><th>Description</th><th>Contenu privé</th><th>Actions</th></tr>`;
  products.forEach((p,i)=>{
    html += `<tr>
      <td><img src="${p.img}" style="width:50px"></td>
      <td>${p.name}</td>
      <td>${p.price}€</td>
      <td>${p.desc}</td>
      <td>${p.content?"✅":"❌"} <button onclick="editPrivateContent(${i})">✏️</button></td>
      <td>
        <button onclick="editProduct(${i})">✏️</button>
        <button onclick="removeProduct(${i})">🗑</button>
      </td>
    </tr>`;
  });
  html += `</table><button onclick="addProductPrompt()">➕ Ajouter produit</button>`;
  document.getElementById("adminContent").innerHTML = html;
}
function addProductPrompt(){
  let name = prompt("Nom du produit:");
  let price = parseFloat(prompt("Prix (€):"));
  let img = prompt("URL image:");
  let desc = prompt("Description:");
  let content = prompt("Contenu privé:");
  if(name && !isNaN(price)){
    products.push({name,price,img,desc,content});
    localStorage.setItem("products",JSON.stringify(products));
    showProductsDashboard();
    renderProducts();
  }
}
function editProduct(index){
  let p = products[index];
  let name = prompt("Nom du produit:",p.name);
  let price = parseFloat(prompt("Prix (€):",p.price));
  let img = prompt("URL image:",p.img);
  let desc = prompt("Description:",p.desc);
  let content = prompt("Contenu privé:",p.content);
  if(name && !isNaN(price)){
    products[index]={name,price,img,desc,content};
    localStorage.setItem("products",JSON.stringify(products));
    showProductsDashboard();
    renderProducts();
  }
}
function removeProduct(index){
  removedProducts.push(products[index]);
  products.splice(index,1);
  localStorage.setItem("products",JSON.stringify(products));
  localStorage.setItem("removedProducts",JSON.stringify(removedProducts));
  showProductsDashboard();
  renderProducts();
}
function editPrivateContent(index){
  let current = products[index].content||"";
  let newContent = prompt("Modifier le contenu privé:",current);
  if(newContent!==null){
    products[index].content=newContent;
    localStorage.setItem("products",JSON.stringify(products));
    showProductsDashboard();
  }
}

/* ===== DASHBOARD UTILISATEURS ===== */
function showUsersDashboard(){
  let html=`<h4>Utilisateurs</h4><table>
    <tr><th>Username</th><th>ID</th><th>Solde</th><th>Dépôts</th><th>Refunds</th><th>Actions</th></tr>`;
  Object.keys(users).forEach(id=>{
    let u = users[id];
    html+=`<tr>
      <td>${u.username||"N/A"}</td>
      <td>${id}</td>
      <td>${u.balance||0}€ <button onclick="adjustBalance('${id}')">💰</button></td>
      <td>${u.deposits||0}€</td>
      <td>${u.refunds||0}/3 <button onclick="resetRefund('${id}')">🔄</button></td>
      <td>
        <button onclick="viewUserOrders('${id}')">📦 Commandes</button>
      </td>
    </tr>`;
  });
  html+=`</table>`;
  document.getElementById("adminContent").innerHTML=html;
}
function adjustBalance(id){
  let val = parseFloat(prompt("Nouveau solde:",users[id].balance||0));
  if(!isNaN(val)){users[id].balance=val;localStorage.setItem("users",JSON.stringify(users));showUsersDashboard();}
}
function resetRefund(id){users[id].refunds=0;localStorage.setItem("users",JSON.stringify(users));showUsersDashboard();}
function viewUserOrders(id){
  let uOrders=orders.filter(o=>o.userId===id);
  if(uOrders.length===0){alert("Pas de commandes");return;}
  let html=uOrders.map(o=>`${o.name} - ${o.price}€<br>Contenu privé: ${o.content}`).join("<hr>");
  document.getElementById("modal").style.display="flex";
  document.getElementById("modalContent").innerHTML=`<h4>Commandes de ${id}</h4>${html}<button class="back-btn" onclick="closeModal()">⬅ Retour</button>`;
}

/* ===== STATISTIQUES ===== */
function showStats(){
  let totalSales = orders.reduce((s,o)=>s+o.price,0);
  let totalDeposits = Object.values(users).reduce((s,u)=>s+(u.deposits||0),0);
  let html=`<h4>📊 Statistiques</h4>
    <p>Total ventes : ${totalSales}€</p>
    <p>Total dépôts utilisateurs : ${totalDeposits}€</p>
    <p>Nombre utilisateurs : ${Object.keys(users).length}</p>`;
  document.getElementById("adminContent").innerHTML=html;
}

renderProducts();
renderCart();
</script>
</body>
</html>
