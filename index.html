<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SAN'ANDREASHOP</title>
<script src="https://telegram.org/js/telegram-web-app.js"></script>

<style>
body{margin:0;font-family:-apple-system,BlinkMacSystemFont,sans-serif;background:radial-gradient(circle at top,#1e293b,#0b1220 70%);color:white;}
.app{padding:24px;}
.header{text-align:center;margin-bottom:40px;}
.avatar{width:80px;height:80px;background:linear-gradient(135deg,#3b82f6,#2563eb);border-radius:50%;margin:auto;display:flex;align-items:center;justify-content:center;font-size:28px;font-weight:bold;}
.card{background:rgba(255,255,255,0.05);backdrop-filter:blur(15px);border-radius:16px;padding:20px;margin-bottom:20px;border:1px solid rgba(255,255,255,0.08);animation:fadeIn .6s ease;transition:.3s;}
.card:hover{transform:scale(1.03);}
.balance{display:flex;justify-content:space-between;font-size:18px;}
.amount{color:#3b82f6;font-weight:600;}
.actions button,.modal-content button,.buy{width:100%;padding:14px;margin-bottom:12px;border-radius:14px;border:none;background:linear-gradient(90deg,#3b82f6,#2563eb);color:white;font-size:16px;font-weight:600;cursor:pointer;transition:.25s;}
.buy:hover,.actions button:hover{transform:scale(1.04);box-shadow:0 5px 20px rgba(0,0,0,0.3);}
.close-btn{background:#374151;}
.back-btn{background:#1f2937;}
.modal{display:none;position:fixed;inset:0;background:rgba(0,0,0,0.6);backdrop-filter:blur(10px);justify-content:center;align-items:center;}
.modal-content{background:#111827;padding:25px;border-radius:20px;width:90%;max-width:380px;animation:zoom .3s ease;}
.grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-top:15px;}
.full{grid-column:1/3;}
.info{margin:6px 0;font-size:14px;}
.products{display:grid;grid-template-columns:1fr 1fr;gap:15px;margin-top:15px;}
.product-card{background:#1e293b;border-radius:14px;padding:15px;transition:.3s;animation:fadeIn .6s ease;}
.product-card:hover{transform:scale(1.05);}
.product-card:active{transform:scale(0.95);}
.product-card img{width:100%;border-radius:10px;}
.skeleton{background:linear-gradient(90deg,#1e293b,#334155,#1e293b);background-size:200%;animation:loading 1.5s infinite;height:80px;border-radius:10px;margin-bottom:10px;}
@keyframes fadeIn{from{opacity:0;transform:translateY(20px);}to{opacity:1;transform:translateY(0);}}
@keyframes zoom{from{transform:scale(.8);opacity:0;}to{transform:scale(1);opacity:1;}}
@keyframes loading{0%{background-position:200%}100%{background-position:-200%}}
</style>
</head>

<body>

<!-- HOME -->
<div class="app" id="home">
  <div class="header"><div class="avatar">CJ</div><h1>CJBOT</h1><p>Boutique Premium Crypto</p></div>
  <div class="card balance"><span>Solde</span><span class="amount" id="balance">0€</span></div>
  <div class="card"><h3>Programme fidélité</h3><p>500€ rechargés = 90€ bonus</p></div>
  <div class="card"><h3>📦 Historique des commandes</h3><div id="orders"></div></div>
  <div class="actions">
    <button onclick="openShop()">🛒 Ouvrir la boutique</button>
    <button onclick="openDeposit()">💳 Recharger</button>
    <button onclick="support()">📩 Support</button>
    <button onclick="openAdmin()">🔒 Admin</button>
  </div>
</div>

<!-- SHOP -->
<div id="shopPage" class="app" style="display:none">
  <div class="card">
    <h3>🛒 Boutique</h3>
    <div class="products" id="productsList"></div>
    <button onclick="checkout()">💳 Payer</button>
    <button class="back-btn" onclick="closeShop()">⬅ Retour</button>
  </div>
</div>

<!-- ADMIN PANEL -->
<div id="adminPanel" style="display:none" class="app">
  <div class="card">
    <h3>🛠 Panel Admin</h3>
    <button onclick="addProductPrompt()">➕ Ajouter un produit</button>
    <button class="full back-btn" onclick="closeAdmin()">⬅ Fermer</button>
    <div id="adminProducts" style="margin-top:15px;"></div>
  </div>
</div>

<!-- MODAL -->
<div id="modal" class="modal"><div class="modal-content" id="modalContent"></div></div>

<script>
const tg = window.Telegram ? window.Telegram.WebApp : null;
if(tg){ tg.expand(); }

/* SOLDE */
let balance = localStorage.getItem("balance")? parseFloat(localStorage.getItem("balance")):100;
document.getElementById("balance").innerText = balance+"€";

/* HISTORIQUE */
let orders = JSON.parse(localStorage.getItem("orders")) || [];
function updateOrders(){document.getElementById("orders").innerHTML = orders.map(o=>`<div class="info">🛒 ${o.name} - ${o.price}€</div>`).join("");}
updateOrders();

/* PRODUITS */
let products = JSON.parse(localStorage.getItem("products")) || [
  {name:"Produit Premium",price:25,img:"https://via.placeholder.com/300",desc:"Accès VIP"},
  {name:"Produit Gold",price:50,img:"https://via.placeholder.com/300",desc:"Pack complet"},
  {name:"Produit Ultimate",price:100,img:"https://via.placeholder.com/300",desc:"Accès total"}
];

function renderProducts(){
  const container = document.getElementById("productsList");
  container.innerHTML = "";
  products.forEach(p=>{
    container.innerHTML += `<div class="product-card">
      <img src="${p.img}">
      <h4>${p.name}</h4>
      <p>${p.desc}</p>
      <button onclick="addToCart('${p.name}',${p.price})">Acheter ${p.price}€</button>
    </div>`;
  });
}

function renderAdminProducts(){
  const container = document.getElementById("adminProducts");
  container.innerHTML = "";
  products.forEach((p,i)=>{
    container.innerHTML += `<div class="info">
      ${p.name} - ${p.price}€
      <button onclick="editProduct(${i})">✏ Modifier</button>
      <button onclick="deleteProduct(${i})">❌ Supprimer</button>
    </div>`;
  });
}

renderProducts();

/* PANIER */
let cart=[];
function addToCart(name,price){cart.push({name,price});alert(name+" ajouté au panier 🛒");}

/* PAIEMENT */
function checkout(){
  let total = cart.reduce((sum,i)=>sum+i.price,0);
  if(total>balance){alert("Solde insuffisant"); return;}
  balance -= total; localStorage.setItem("balance",balance);
  document.getElementById("balance").innerText = balance+"€";
  cart.forEach(i=>orders.push(i));
  localStorage.setItem("orders",JSON.stringify(orders));
  cart=[]; updateOrders();
  alert("Paiement réussi");
}

/* NAVIGATION */
function openShop(){document.getElementById("home").style.display="none";document.getElementById("shopPage").style.display="block";}
function closeShop(){document.getElementById("home").style.display="block";document.getElementById("shopPage").style.display="none";}

/* DEPOT CRYPTO */
const addresses={BTC:"bc1q5t9rtfkjlkj4f3hr4kh9j5khcwqz52lv03dkrr",ETH:"0x5A652C891ee6F1cAF45c829A0e42f81856524939",USDT:"0x5A652C891ee6F1cAF45c829A0e42f81856524939",USDC:"0x5A652C891ee6F1cAF45c829A0e42f81856524939"};

function openDeposit(){
  document.getElementById("modal").style.display="flex";
  document.getElementById("modalContent").innerHTML=`
    <h3>💰 DÉPÔT CRYPTO</h3>
    <div class="grid">
      <button onclick="selectCrypto('USDT')">USDT</button>
      <button onclick="selectCrypto('USDC')">USDC</button>
      <button onclick="selectCrypto('BTC')">BTC</button>
      <button onclick="selectCrypto('ETH')">ETH</button>
      <button class="full back-btn" onclick="closeModal()">⬅ Retour</button>
    </div>`;
}

function selectCrypto(c){
  document.getElementById("modalContent").innerHTML=`
    <h3>Dépôt ${c}</h3>
    <p style="word-break:break-all">${addresses[c]}</p>
    <button onclick="copyAddress('${addresses[c]}')">Copier</button>
    <button class="back-btn" onclick="openDeposit()">⬅ Retour</button>`;
}

function copyAddress(a){navigator.clipboard.writeText(a); alert("Adresse copiée");}
function closeModal(){document.getElementById("modal").style.display="none";}
function support(){alert("Support bientôt disponible");}

/* PANEL ADMIN */
function openAdmin(){
  let pwd = prompt("Mot de passe admin:");
  if(pwd==="CJADMINDU31"){
    document.getElementById("home").style.display="none";
    document.getElementById("shopPage").style.display="none";
    document.getElementById("adminPanel").style.display="block";
    renderAdminProducts();
  }else{alert("Mot de passe incorrect");}
}
function closeAdmin(){document.getElementById("adminPanel").style.display="none";document.getElementById("home").style.display="block";}

/* ADMIN PRODUIT */
function addProductPrompt(){
  let name = prompt("Nom du produit:");
  let price = parseFloat(prompt("Prix (€):"));
  let img = prompt("URL image:");
  let desc = prompt("Description:");
  if(name && !isNaN(price)){
    products.push({name,price,img,desc});
    localStorage.setItem("products",JSON.stringify(products));
    renderProducts();
    renderAdminProducts();
    alert("Produit ajouté");
  }
}

function editProduct(i){
  let p = products[i];
  let name = prompt("Nom du produit:",p.name);
  let price = parseFloat(prompt("Prix (€):",p.price));
  let img = prompt("URL image:",p.img);
  let desc = prompt("Description:",p.desc);
  if(name && !isNaN(price)){
    products[i] = {name,price,img,desc};
    localStorage.setItem("products",JSON.stringify(products));
    renderProducts();
    renderAdminProducts();
    alert("Produit modifié");
  }
}

function deleteProduct(i){
  if(confirm("Supprimer ce produit ?")){
    products.splice(i,1);
    localStorage.setItem("products",JSON.stringify(products));
    renderProducts();
    renderAdminProducts();
    alert("Produit supprimé");
  }
}
</script>

</body>
</html>
