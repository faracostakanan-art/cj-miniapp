<!DOCTYPE html>
<html lang="fr">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CJBOT</title>

<script src="https://telegram.org/js/telegram-web-app.js"></script>

<style>

/* BASE */

body{
margin:0;
font-family:-apple-system,BlinkMacSystemFont,sans-serif;
background:radial-gradient(circle at top,#1e293b,#0b1220 70%);
color:white;
}

.app{padding:24px;}

.header{text-align:center;margin-bottom:40px;}

.avatar{
width:80px;
height:80px;
background:linear-gradient(135deg,#3b82f6,#2563eb);
border-radius:50%;
margin:auto;
display:flex;
align-items:center;
justify-content:center;
font-size:28px;
font-weight:bold;
}

/* CARD */

.card{
background:rgba(255,255,255,0.05);
backdrop-filter:blur(15px);
border-radius:16px;
padding:20px;
margin-bottom:20px;
border:1px solid rgba(255,255,255,0.08);
animation:fadeIn .6s ease;
transition:.3s;
}

.card:hover{transform:scale(1.03);}

.balance{
display:flex;
justify-content:space-between;
font-size:18px;
}

.amount{color:#3b82f6;font-weight:600;}

/* BUTTON */

button{
width:100%;
padding:14px;
margin-bottom:12px;
border-radius:14px;
border:none;
background:linear-gradient(90deg,#3b82f6,#2563eb);
color:white;
font-size:15px;
font-weight:600;
cursor:pointer;
transition:.25s;
}

button:hover{
transform:scale(1.04);
box-shadow:0 5px 20px rgba(0,0,0,0.3);
}

.back-btn{background:#1f2937;}
.close-btn{background:#374151;}

/* GRID */

.grid{
display:grid;
grid-template-columns:1fr 1fr;
gap:10px;
margin-top:15px;
}

.full{grid-column:1/3;}

.info{margin:6px 0;font-size:14px;}

/* PRODUCTS */

.products{
display:grid;
grid-template-columns:1fr 1fr;
gap:15px;
margin-top:15px;
}

.product-card{
background:#1e293b;
border-radius:14px;
padding:15px;
transition:.3s;
}

.product-card:hover{transform:scale(1.05);}
.product-card:active{transform:scale(.95);}

.product-card img{
width:100%;
border-radius:10px;
}

/* CART */

.cart-page{
display:none;
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:#020617;
padding:20px;
overflow:auto;
}

.cart-item{
display:flex;
justify-content:space-between;
margin-bottom:10px;
background:#1e293b;
padding:10px;
border-radius:8px;
}

/* MODAL */

.modal{
display:none;
position:fixed;
inset:0;
background:rgba(0,0,0,.6);
backdrop-filter:blur(10px);
justify-content:center;
align-items:center;
}

.modal-content{
background:#111827;
padding:25px;
border-radius:20px;
width:90%;
max-width:380px;
}

/* ANIMATIONS */

@keyframes fadeIn{
from{opacity:0;transform:translateY(20px);}
to{opacity:1;transform:translateY(0);}
}

</style>
</head>

<body>

<!-- HOME -->

<div class="app" id="homePage">

<div class="header">
<div class="avatar">CJ</div>
<h1>CJBOT</h1>
<p>Boutique Premium Crypto</p>
</div>

<div class="card balance">
<span>Solde</span>
<span class="amount">0.00€</span>
</div>

<div class="card">
<h3>Programme fidélité</h3>
<p>500€ rechargés = 90€ bonus</p>
</div>

<button onclick="openShop()">🛒 Boutique</button>
<button onclick="openCart()">🧺 Panier (<span id="cartCount">0</span>)</button>
<button onclick="openDeposit()">💳 Recharger</button>
<button onclick="support()">📩 Support</button>

</div>

<!-- SHOP -->

<div id="shopPage" class="app" style="display:none">

<div class="card">
<h3>Boutique</h3>

<div class="products" id="products"></div>

<button class="back-btn" onclick="closeShop()">⬅ Retour</button>

</div>

</div>

<!-- CART -->

<div id="cartPage" class="cart-page">

<h2>Votre panier</h2>

<div id="cartItems"></div>

<h3>Total : <span id="cartTotal">0</span> €</h3>

<button onclick="checkout()">Payer</button>
<button class="back-btn" onclick="closeCart()">Retour</button>

</div>

<!-- MODAL -->

<div id="modal" class="modal">
<div class="modal-content" id="modalContent"></div>
</div>

<script>

const tg = window.Telegram?.WebApp;
if(tg) tg.expand();

/* PRODUITS */

const products = [

{name:"Produit Premium",price:25,img:"https://via.placeholder.com/300"},
{name:"Produit Gold",price:50,img:"https://via.placeholder.com/300"},
{name:"Produit Ultimate",price:100,img:"https://via.placeholder.com/300"}

];

const container=document.getElementById("products");

products.forEach((p,i)=>{

container.innerHTML+=`

<div class="product-card">

<img src="${p.img}">
<h4>${p.name}</h4>
<p>${p.price}€</p>

<button onclick="addToCart(${i})">
Ajouter au panier
</button>

</div>

`

});

/* PANIER */

let cart=[];

function addToCart(i){

cart.push(products[i]);

updateCart();

tg?.showAlert(products[i].name+" ajouté au panier");

}

function updateCart(){

document.getElementById("cartCount").innerText=cart.length;

let items="";
let total=0;

cart.forEach((item,index)=>{

total+=item.price;

items+=`

<div class="cart-item">

${item.name} - ${item.price}€

<button onclick="removeItem(${index})">❌</button>

</div>

`;

});

document.getElementById("cartItems").innerHTML=items;
document.getElementById("cartTotal").innerText=total;

}

function removeItem(i){
cart.splice(i,1);
updateCart();
}

/* NAVIGATION */

function openShop(){
homePage.style.display="none";
shopPage.style.display="block";
}

function closeShop(){
homePage.style.display="block";
shopPage.style.display="none";
}

function openCart(){
cartPage.style.display="block";
}

function closeCart(){
cartPage.style.display="none";
}

/* CHECKOUT */

function checkout(){

let total=cart.reduce((sum,i)=>sum+i.price,0);

tg?.showAlert("Paiement de "+total+"€");

}

/* DEPOT */

const addresses={
BTC:"bc1q5t9rtfkjlkj4f3hr4kh9j5khcwqz52lv03dkrr",
ETH:"0x5A652C891ee6F1cAF45c829A0e42f81856524939",
USDT:"0x5A652C891ee6F1cAF45c829A0e42f81856524939",
USDC:"0x5A652C891ee6F1cAF45c829A0e42f81856524939"
};

function openDeposit(){

modal.style.display="flex";

modalContent.innerHTML=`

<h3>Dépôt Crypto</h3>

<div class="grid">

<button onclick="showAddress('BTC')">Bitcoin</button>
<button onclick="showAddress('ETH')">Ethereum</button>
<button onclick="showAddress('USDT')">USDT</button>
<button onclick="showAddress('USDC')">USDC</button>

<button class="full back-btn" onclick="closeModal()">Fermer</button>

</div>

`;

}

function showAddress(c){

modalContent.innerHTML=`

<h3>Dépôt ${c}</h3>

<p style="word-break:break-all">${addresses[c]}</p>

<button onclick="copyAddress('${addresses[c]}')">
Copier adresse
</button>

<button class="back-btn" onclick="openDeposit()">Retour</button>

`;

}

function copyAddress(a){

navigator.clipboard.writeText(a);

tg?.showAlert("Adresse copiée");

}

function closeModal(){
modal.style.display="none";
}

function support(){
tg?.showAlert("Support bientôt disponible");
}

</script>

</body>
</html>
