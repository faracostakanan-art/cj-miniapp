<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CJBOT - Boutique</title>
<script src="https://telegram.org/js/telegram-web-app.js"></script>
<style>
/* ===== GENERAL ===== */
body{margin:0;font-family:-apple-system,BlinkMacSystemFont,sans-serif;background:#0b1220;color:white;}
.app{padding:24px;}
.header{text-align:center;margin-bottom:30px;}
.avatar{width:80px;height:80px;background:linear-gradient(135deg,#3b82f6,#2563eb);border-radius:50%;margin:auto;display:flex;align-items:center;justify-content:center;font-size:28px;font-weight:bold;}
.card{background:rgba(255,255,255,0.05);backdrop-filter:blur(15px);border-radius:16px;padding:20px;margin-bottom:20px;border:1px solid rgba(255,255,255,0.08);transition:.3s;position:relative;}
.card:hover{transform:scale(1.03);}
.balance{display:flex;justify-content:space-between;font-size:18px;}
.amount{color:#3b82f6;font-weight:600;}
button{width:100%;padding:14px;margin-bottom:12px;border-radius:14px;border:none;background:linear-gradient(90deg,#3b82f6,#2563eb);color:white;font-size:16px;font-weight:600;cursor:pointer;transition:.25s;}
button:hover{transform:scale(1.04);box-shadow:0 5px 20px rgba(0,0,0,0.3);}
.back-btn{background:#1f2937;}
.modal{display:none;position:fixed;inset:0;background:rgba(0,0,0,0.6);backdrop-filter:blur(10px);justify-content:center;align-items:center;}
.modal-content{background:#111827;padding:25px;border-radius:20px;width:90%;max-width:480px;animation:zoom .3s ease;}
.grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-top:15px;}
.full{grid-column:1/3;}
.info{margin:6px 0;font-size:14px;}
.products{display:grid;grid-template-columns:1fr 1fr;gap:15px;margin-top:15px;}
.product-card{background:#1f2937;border-radius:16px;padding:15px;transition:.3s;position:relative;box-shadow:0 3px 10px rgba(0,0,0,0.2);}
.product-card:hover{transform:scale(1.05);box-shadow:0 8px 20px rgba(59,130,246,0.5);}
.product-card img{width:100%;border-radius:12px;}
.price-badge{position:absolute;top:10px;right:10px;background:#3b82f6;padding:5px 10px;border-radius:12px;font-weight:bold;}
.order-bubble{background:rgba(255,255,255,0.05);padding:10px;border-radius:12px;position:relative;margin-bottom:10px;}
.order-bubble button{float:right;font-size:12px;background:#3b82f6;padding:2px 6px;border:none;border-radius:6px;color:white;cursor:pointer;}
.crypto-card{padding:12px;background:rgba(59,130,246,0.1);border-radius:12px;text-align:center;cursor:pointer;transition:.25s;margin-bottom:10px;}
.crypto-card:hover{background:rgba(59,130,246,0.3);transform:scale(1.05);}
table{width:100%;border-collapse:collapse;margin-top:10px;}
th,td{padding:8px;text-align:left;border-bottom:1px solid rgba(255,255,255,0.1);}
th{background:#111827;}
td button{width:auto;padding:6px 10px;margin:0 2px;font-size:14px;}
@keyframes zoom{from{transform:scale(.8);opacity:0;}to{transform:scale(1);opacity:1);}
</style>
</head>
<body>

<!-- HOME -->
<div class="app" id="home">
  <div class="header">
    <div class="avatar">CJ</div>
    <h1>CJAYSHOP</h1>
    <p>Boutique Premium Crypto</p>
  </div>

  <div class="card balance">
    <span>Solde</span>
    <span class="amount" id="balance">0€</span>
  </div>

  <div class="card">
    <h3>Programme fidélité</h3>
    <p>500€ rechargés = 100€ bonus</p>
  </div>

  <div class="card">
    <h3>📦 Historique des commandes</h3>
    <div id="orders"></div>
  </div>

  <div class="actions">
    <button onclick="openShop()">🛒 Ouvrir la boutique</button>
    <button onclick="openDeposit()">💳 Recharger</button>
    <button onclick="support()">📩 Support</button>
    <button onclick="openAdmin()">🔒 Admin</button>
  </div>
</div>

<!-- SHOP -->
<div id="shopPage" class="app" style="display:none">
  <div class="card">
    <h3>🛒 Boutique</h3>
    <div class="products" id="productsList"></div>

    <div class="card">
      <h3>🛍 Panier</h3>
      <div id="cartList"></div>
      <button onclick="checkout()">💳 Acheter le panier</button>
    </div>

    <button class="back-btn" onclick="closeShop()">⬅ Retour</button>
  </div>
</div>

<!-- ADMIN PANEL -->
<div id="adminPanel" class="app" style="display:none">
  <div class="card">
    <h3>🛠 Panel Admin</h3>
    <div style="margin-bottom:15px;">
      <button onclick="showProductsDashboard()">📦 Produits</button>
      <button onclick="showUsersDashboard()">👥 Utilisateurs</button>
      <button onclick="showStats()">📊 Statistiques</button>
      <button class="back-btn" onclick="closeAdmin()">⬅ Fermer</button>
    </div>
    <div id="adminContent"></div>
  </div>
</div>

<!-- MODAL -->
<div id="modal" class="modal"><div class="modal-content" id="modalContent"></div></div>

<script>
/* ===== TELEGRAM WEBAPP ===== */
const tg = window.Telegram ? window.Telegram.WebApp : null;
if(tg){ tg.expand(); }

/* ===== VARIABLES ===== */
let users = JSON.parse(localStorage.getItem("users")) || {};
function generateId(){ return 'user'+Math.random().toString(36).substr(2,9); }
let currentUserId = localStorage.getItem("currentUserId");
if(!currentUserId){
  currentUserId = generateId();
  localStorage.setItem("currentUserId",currentUserId);
}
if(!users[currentUserId]){
  users[currentUserId] = {username:currentUserId,balance:0,orders:[],deposits:0,refunds:0};
  localStorage.setItem("users",JSON.stringify(users));
}

let balance = users[currentUserId].balance || 0;
let orders = JSON.parse(localStorage.getItem("orders")) || [];
let products = JSON.parse(localStorage.getItem("products")) || [];
let removedProducts = JSON.parse(localStorage.getItem("removedProducts")) || [];
document.getElementById("balance").innerText = balance+"€";

/* ===== HISTORIQUE COMMANDES ===== */
function updateOrders(){
  const container = document.getElementById("orders");
  let uOrders = orders.filter(o=>o.userId===currentUserId);
  if(uOrders.length===0){ container.innerHTML="<p style='opacity:.7;'>Aucune commande</p>"; return; }
  container.innerHTML = uOrders.map(o=>`
    <div class="order-bubble">
      <strong>${o.name} - ${o.price}€</strong>
      <button onclick="toggleContent(this)">Voir</button>
      <p style="display:none;margin-top:5px;color:#9ca3af;">${o.content}</p>
    </div>`).join("");
}
function toggleContent(btn){
  const p = btn.nextElementSibling;
  p.style.display = (p.style.display==='none')?'block':'none';
}

/* ===== BOUTIQUE ===== */
let cart = [];
function renderProducts(){
  const container = document.getElementById("productsList");
  container.innerHTML = "";
  if(products.length===0){container.innerHTML="<p>Aucun produit disponible</p>"; return;}
  products.forEach(p=>{
    container.innerHTML += `<div class="product-card">
      <div class="price-badge">${p.price}€</div>
      <img src="${p.img}">
      <h4>${p.name}</h4>
      <p>${p.desc}</p>
      <button onclick="addToCart('${p.name}',${p.price},'${p.content}')">Acheter</button>
    </div>`;
  });
}
function addToCart(name,price,content){
  if(cart.find(p=>p.name===name)){alert("Déjà dans le panier"); return;}
  cart.push({name,price,content});
  renderCart();
}
function removeFromCart(index){cart.splice(index,1);renderCart();}
function renderCart(){
  const container = document.getElementById("cartList");
  if(cart.length===0){container.innerHTML="<p>Panier vide</p>"; return;}
  container.innerHTML = cart.map((p,i)=>`<div class="info">${p.name} - ${p.price}€ <button onclick="removeFromCart(${i})" style="float:right">❌</button></div>`).join("");
}
function checkout(){
  if(cart.length===0){alert("Panier vide"); return;}
  let total = cart.reduce((s,p)=>s+p.price,0);
  if(total>balance){alert("Solde insuffisant"); return;}
  balance -= total;
  users[currentUserId].balance = balance;
  cart.forEach(p=>{
    orders.push({...p,userId:currentUserId});
    users[currentUserId].orders.push({...p,userId:currentUserId});
    products = products.filter(prod=>prod.name!==p.name);
    removedProducts.push(p);
  });
  localStorage.setItem("orders",JSON.stringify(orders));
  localStorage.setItem("products",JSON.stringify(products));
  localStorage.setItem("removedProducts",JSON.stringify(removedProducts));
  localStorage.setItem("users",JSON.stringify(users));
  document.getElementById("balance").innerText = balance+"€";
  cart=[]; renderCart(); renderProducts(); updateOrders();
  alert("Achat réussi ! Contenu privé disponible dans l'historique.");
}

/* ===== NAVIGATION ===== */
function openShop(){document.getElementById("home").style.display="none";document.getElementById("shopPage").style.display="block"; }
function closeShop(){document.getElementById("home").style.display="block";document.getElementById("shopPage").style.display="none";}

/* ===== DEPOT CRYPTO ===== */
const addresses={BTC:"bc1q5t9rtfkjlkj4f3hr4kh9j5khcwqz52lv03dkrr",ETH:"0x5A652C891ee6F1cAF45c829A0e42f81856524939",USDT:"0x5A652C891ee6F1cAF45c829A0e42f81856524939",USDC:"0x5A652C891ee6F1cAF45c829A0e42f81856524939"};
function openDeposit(){
  document.getElementById("modal").style.display="flex";
  document.getElementById("modalContent").innerHTML=`
    <h3>💰 DÉPÔT CRYPTO</h3>
    <div class="grid">
      <button onclick="selectCrypto('USDT')">USDT</button>
      <button onclick="selectCrypto('USDC')">USDC</button>
      <button onclick="selectCrypto('BTC')">BTC</button>
      <button onclick="selectCrypto('ETH')">ETH</button>
      <button class="full back-btn" onclick="closeModal()">⬅ Retour</button>
    </div>`;
}
function selectCrypto(c){
  document.getElementById("modalContent").innerHTML=`
    <h3>Dépôt ${c}</h3>
    <div class="crypto-card" onclick="copyAddress('${addresses[c]}')">${addresses[c]}</div>
    <input type="number" id="depositAmount" placeholder="Montant (€)" style="width:100%;margin:8px 0;padding:8px;border-radius:8px;border:none;">
    <button onclick="validateDeposit('${c}')">💳 Déposer</button>
    <button class="back-btn" onclick="openDeposit()">⬅ Retour</button>`;
}
function copyAddress(a){navigator.clipboard.writeText(a); alert("Adresse copiée !");}
function validateDeposit(c){
  const amount = parseFloat(document.getElementById("depositAmount").value);
  if(isNaN(amount)||amount<=0) return alert("Montant invalide");
  balance += amount; users[currentUserId].balance = balance; users[currentUserId].deposits += amount;
  localStorage.setItem("users",JSON.stringify(users));
  document.getElementById("balance").innerText = balance+"€";
  alert("Dépôt réussi !");
  closeModal();
}
function closeModal(){document.getElementById("modal").style.display="none";}
function support(){alert("Support bientôt disponible");}

/* ===== ADMIN ===== */
function openAdmin(){ let pwd=prompt("Mot de passe admin:"); if(pwd==="GABON241"){ document.getElementById("home").style.display="none"; document.getElementById("shopPage").style.display="none"; document.getElementById("adminPanel").style.display="block"; }else alert("Mot de passe incorrect"); }
function closeAdmin(){document.getElementById("adminPanel").style.display="none";document.getElementById("home").style.display="block";}

/* ===== INIT ===== */
renderProducts(); renderCart(); updateOrders();
</script>
</body>
</html>
