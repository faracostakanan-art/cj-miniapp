<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<title>Mini Telegram Web</title>
<link rel="stylesheet" href="style.css">
</head>
<body>
<div class="chat-container">
    <div id="messages" class="messages"></div>
    <div class="input-container">
        <input type="text" id="msg" placeholder="Écrivez un message..." autocomplete="off">
        <button onclick="sendMessage()">Envoyer</button>
    </div>
</div>
<script src="/socket.io/socket.io.js"></script>
<script src="script.js"></script>
</body {
    font-family: sans-serif;
    background: #f0f0f0;
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
    margin: 0;
}
.chat-container {
    width: 400px;
    height: 600px;
    background: #fff;
    border-radius: 8px;
    padding: 10px;
    display: flex;
    flex-direction: column;
    box-shadow: 0 4px 15px rgba(0,0,0,0.2);
}
.messages {
    flex: 1;
    overflow-y: auto;
    margin-bottom: 10px;
}
.message {
    margin: 5px 0;
    padding: 8px;
    border-radius: 5px;
    max-width: 80%;
    word-wrap: break-word;
}
.message.vous {
    background: #DCF8C6;
    align-self: flex-end;
}
.message.bot {
    background: #eee;
    align-self: flex-start;
}
.input-container {
    display: flex;
}
input {
    flex: 1;
    padding: 8px;
    border-radius: 5px;
    border: 1px solid #ccc;
}
button {
    padding: 8px 12px;
    margin-left: 5px;
    border-radius: 5px;
    border: none;
    background: #0088cc;
    color: #fff;
    cursor: pointer;
}
button:hover {
    background: #006699;
}>
</html>
