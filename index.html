<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CJBOT</title>

<style>
body{
  margin:0;
  font-family:-apple-system,BlinkMacSystemFont,sans-serif;
  background:radial-gradient(circle at top,#1e293b,#0b1220 70%);
  color:white;
}

.app{padding:24px;}

.header{text-align:center;margin-bottom:40px;}

.avatar{
  width:80px;height:80px;
  background:linear-gradient(135deg,#3b82f6,#2563eb);
  border-radius:50%;
  margin:auto;
  display:flex;
  align-items:center;
  justify-content:center;
  font-size:28px;
  font-weight:bold;
}

.card{
  background:rgba(255,255,255,0.05);
  backdrop-filter:blur(15px);
  border-radius:16px;
  padding:20px;
  margin-bottom:20px;
  border:1px solid rgba(255,255,255,0.08);
}

.balance{
  display:flex;
  justify-content:space-between;
  font-size:18px;
}

.amount{color:#3b82f6;font-weight:600;}

button{
  cursor:pointer;
}

.modal{
  display:none;
  position:fixed;
  inset:0;
  background:rgba(0,0,0,0.6);
  backdrop-filter:blur(10px);
  justify-content:center;
  align-items:center;
}

.modal-content{
  background:#111827;
  padding:25px;
  border-radius:20px;
  width:85%;
  max-width:350px;
  text-align:center;
}

.close-btn{
  background:#374151;
}

</style>
</head>

<body>

<div class="app">

  <div class="header">
    <div class="avatar">CJ</div>
    <h1>CJBOT</h1>
    <p>Boutique Premium</p>
  </div>

  <div class="card balance">
    <span>Solde</span>
    <span class="amount">0.00€</span>
  </div>

  <div class="card">
    <h3>Boutique</h3>
    <div id="shopItems"></div>
  </div>

</div>

<!-- MODAL -->
<div id="depositModal" class="modal">
  <div class="modal-content" id="modalContent">
    <h3>Choisir un dépôt</h3>
    <button onclick="selectCrypto('BTC')">Bitcoin</button><br><br>
    <button onclick="selectCrypto('ETH')">Ethereum</button><br><br>
    <button onclick="selectCrypto('USDT')">USDT (ERC20)</button><br><br>
    <button class="close-btn" onclick="closeModal()">Fermer</button>
  </div>
</div>

<script>

let selectedProduct=null;

const products=[
  {name:"LOG",price:45,description:"Accès LOG"},
  {name:"CC",price:30,description:"Accès CC"}
];

const addresses={
  BTC:"bc1q2kd0kpzmvr9nz6xhwgvjpk7kapcw3wd9r6wjzz",
  ETH:"0x1F3E0A4E2ec341C718d706ACdabad874484033ae",
  USDT:"0x5A652C891ee6F1cAF45c829A0e42f81856524939"
};

function openShop(){
  const container=document.getElementById("shopItems");
  container.innerHTML="";
  
  products.forEach(product=>{
    container.innerHTML+=`
      <div style="background:rgba(255,255,255,0.05);
      padding:15px;border-radius:12px;margin-bottom:12px;">
        <strong>${product.name}</strong><br>
        <span style="color:#3b82f6;font-weight:600;">
        ${product.price}€
        </span><br>
        <small style="opacity:0.7;display:block;margin-bottom:10px;">
        ${product.description}
        </small>
        <button onclick="buyProduct('${product.name}')"
        style="width:100%;padding:10px;border-radius:10px;border:none;
        background:linear-gradient(90deg,#3b82f6,#2563eb);
        color:white;font-weight:600;">
        Acheter
        </button>
      </div>
    `;
  });
}

function buyProduct(name){
  selectedProduct=products.find(p=>p.name===name);
  alert("Produit sélectionné : "+selectedProduct.name+
        " | Montant : "+selectedProduct.price+"€");
  recharge();
}

function recharge(){
  document.getElementById("depositModal").style.display="flex";
}

function closeModal(){
  document.getElementById("depositModal").style.display="none";
}

function selectCrypto(crypto){
  const modal=document.getElementById("modalContent");
  
  modal.innerHTML=`
    <h3>Dépôt ${crypto}</h3>
    <p style="font-size:13px;margin:15px 0;">
    Montant à payer : ${selectedProduct.price}€
    </p>
    <p style="word-break:break-all;font-size:12px;">
    ${addresses[crypto]}
    </p>
    <button onclick="copyAddress('${addresses[crypto]}')">
    Copier l'adresse
    </button><br><br>
    <button onclick="confirmPayment()">J'ai payé</button><br><br>
    <button onclick="resetModal()">Retour</button>
  `;
}

function resetModal(){
  const modal=document.getElementById("modalContent");
  modal.innerHTML=`
    <h3>Choisir un dépôt</h3>
    <button onclick="selectCrypto('BTC')">Bitcoin</button><br><br>
    <button onclick="selectCrypto('ETH')">Ethereum</button><br><br>
    <button onclick="selectCrypto('USDT')">USDT (ERC20)</button><br><br>
    <button class="close-btn" onclick="closeModal()">Fermer</button>
  `;
}

function copyAddress(address){
  navigator.clipboard.writeText(address);
  alert("Adresse copiée");
}

function confirmPayment(){
  alert("Paiement confirmé pour : "+selectedProduct.name);
  unlockProduct();
}

function unlockProduct(){
  alert("Accès débloqué pour : "+selectedProduct.name);
  closeModal();
}

openShop();

</script>

</body>
</html>
