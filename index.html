<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CJ-SHOP</title>

<style>
body{
  margin:0;
  font-family:-apple-system,BlinkMacSystemFont,sans-serif;
  background:#0f172a;
  color:white;
}

.page{
  display:none;
  padding:20px;
  padding-bottom:90px;
  min-height:100vh;
}

.active{
  display:block;
}

.card{
  background:#1e293b;
  border-radius:18px;
  padding:18px;
  margin-bottom:15px;
}

button{
  border:none;
  border-radius:14px;
  padding:10px 16px;
  font-weight:600;
  cursor:pointer;
}

.btn-primary{
  background:linear-gradient(90deg,#3b82f6,#2563eb);
  color:white;
}

.bottom-nav{
  position:fixed;
  bottom:0;
  left:0;
  right:0;
  height:70px;
  background:#111827;
  display:flex;
  justify-content:space-around;
  align-items:center;
  border-top:1px solid #1f2937;
}

.nav-item{
  text-align:center;
  font-size:13px;
  cursor:pointer;
  opacity:0.6;
}

.nav-item.active{
  opacity:1;
  color:#3b82f6;
}

.badge{
  background:red;
  border-radius:50%;
  padding:2px 6px;
  font-size:11px;
  margin-left:4px;
}
</style>
</head>
<body>

<!-- ACCUEIL -->
<div id="home" class="page active">
  <h2>Accueil</h2>

  <div class="card">
    <h3>LOG</h3>
    <p>45€</p>
    <button class="btn-primary" onclick="addToCart('LOG',45)">Ajouter</button>
  </div>

  <div class="card">
    <h3>CC</h3>
    <p>30€</p>
    <button class="btn-primary" onclick="addToCart('CC',30)">Ajouter</button>
  </div>
</div>

<!-- PANIER -->
<div id="cart" class="page">
  <h2>Panier</h2>
  <div id="cartItems"></div>
  <h3 id="total"></h3>
  <button class="btn-primary" onclick="checkout()">Valider commande</button>
</div>

<!-- COMMANDES -->
<div id="orders" class="page">
  <h2>Commandes</h2>
  <div id="ordersList"></div>
</div>

<!-- REFUND -->
<div id="refund" class="page">
  <h2>Demande de remboursement</h2>
  <div class="card">
    <p>Entrez votre ID commande :</p>
    <input id="refundId" style="width:100%;padding:8px;border-radius:8px;border:none;">
    <button class="btn-primary" style="margin-top:10px;" onclick="requestRefund()">Envoyer</button>
  </div>
</div>

<!-- NAVIGATION -->
<div class="bottom-nav">
  <div class="nav-item active" onclick="navigate('home',this)">
    Accueil
  </div>

  <div class="nav-item" onclick="navigate('cart',this)">
    Panier <span id="cartCount" class="badge">0</span>
  </div>

  <div class="nav-item" onclick="navigate('orders',this)">
    Commandes
  </div>

  <div class="nav-item" onclick="navigate('refund',this)">
    Refund
  </div>
</div>

<script>
let cart=[];
let orders=[];

function navigate(page,element){
  document.querySelectorAll('.page').forEach(p=>p.classList.remove('active'));
  document.getElementById(page).classList.add('active');

  document.querySelectorAll('.nav-item').forEach(n=>n.classList.remove('active'));
  element.classList.add('active');
}

function addToCart(name,price){
  cart.push({name,price});
  updateCart();
}

function updateCart(){
  document.getElementById("cartCount").innerText=cart.length;

  let container=document.getElementById("cartItems");
  container.innerHTML="";
  let total=0;

  cart.forEach(item=>{
    total+=item.price;
    container.innerHTML+=`
      <div class="card">
        ${item.name} - ${item.price}€
      </div>
    `;
  });

  document.getElementById("total").innerText="Total : "+total+"€";
}

function checkout(){
  if(cart.length===0) return;

  let id="CMD"+Date.now();
  orders.push({id,items:[...cart]});
  cart=[];
  updateCart();
  updateOrders();
  alert("Commande validée ID : "+id);
}

function updateOrders(){
  let container=document.getElementById("ordersList");
  container.innerHTML="";

  orders.forEach(order=>{
    container.innerHTML+=`
      <div class="card">
        <strong>${order.id}</strong><br>
        ${order.items.length} article(s)
      </div>
    `;
  });
}

function requestRefund(){
  let id=document.getElementById("refundId").value;
  alert("Demande envoyée pour : "+id);
}
</script>

</body>
</html>
